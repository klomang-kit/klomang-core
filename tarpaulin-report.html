<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

{\n    if daa_score == 0 {\n        return 0;\n    }\n\n    // Parameterized halving series up to the floor-1 reward point.\n    const HALVING_REWARDS: [u128; 34] = [\n        10000000000, 5000000000, 2500000000, 1250000000, 625000000, 312500000,\n        156250000, 78125000, 39062500, 19531250, 9765625, 4882812, 2441406,\n        1220703, 610351, 305175, 152587, 76293, 38146, 19073, 9536, 4768,\n        2384, 1192, 596, 298, 149, 74, 37, 18, 9, 4, 2, 1,\n    ];\n\n    const CUMULATIVE_REWARDS: [u128; 34] = [\n        10000000000, 15000000000, 17500000000, 18750000000, 19375000000,\n        19687500000, 19843750000, 19921875000, 19960937500, 19980468750,\n        19990234375, 19995117187, 19997558593, 19998779296, 19999389647,\n        19999694822, 19999847409, 19999923702, 19999961848, 19999980921,\n        19999990457, 19999995225, 19999997609, 19999998801, 19999999397,\n        19999999695, 19999999844, 19999999918, 19999999955, 19999999973,\n        19999999982, 19999999986, 19999999988, 19999999989,\n    ];\n\n    let full_intervals = (daa_score / HALVING_INTERVAL) as usize;\n    let remainder_blocks = daa_score % HALVING_INTERVAL;\n\n    let full_emitted = if full_intervals == 0 {\n        0\n    } else if full_intervals \u003c= HALVING_REWARDS.len() {\n        CUMULATIVE_REWARDS[full_intervals - 1] * HALVING_INTERVAL as u128\n    } else {\n        // After rewards reach 1 unit, they remain constant.\n        let capped_base = CUMULATIVE_REWARDS.last().copied().unwrap_or(0);\n        capped_base * HALVING_INTERVAL as u128\n            + (full_intervals as u128 - HALVING_REWARDS.len() as u128) * MIN_REWARD * HALVING_INTERVAL as u128\n    };\n\n    let next_reward = if full_intervals \u003c HALVING_REWARDS.len() {\n        HALVING_REWARDS[full_intervals]\n    } else {\n        MIN_REWARD\n    };\n\n    let remainder_emitted = (remainder_blocks as u128).saturating_mul(next_reward);\n\n    full_emitted\n        .saturating_add(remainder_emitted)\n        .min(MAX_ "covered":31,"coverable":53},{"path":["/","workspaces","klomang-core","src","core","consensus","ghostdag.rs"],"content":"use std::collections::{HashSet, HashMap};\nuse crate::core::crypto::Hash;\nuse crate::core::dag::Dag;\n\n#[derive(Debug, Clone)]\npub struct VirtualBlock {\n    pub parents: HashSet\u003cHash\u003e,\n    pub selected_parent: Option\u003cHash\u003e,\n    pub blue_set: HashSet\u003cHash\u003e,\n    pub red_set: HashSet\u003cHash\u003e,\n    pub blue_score: u64,\n}\n\n#[derive(Debug, Clone)]\npub struct GhostDag {\n    pub k: usize,\n}\n\nimpl GhostDag {\n    pub fn new(k: usize) -\u003e Self {\n        Self { k }\n    }\n\n    pub fn select_parent(\u0026self, dag: \u0026Dag, parents: \u0026[Hash]) -\u003e Option\u003cHash\u003e {\n        if parents.is_empty() {\n            return None;\n        }\n        \n        // Max 2 parents: select only two with highest blue_score\n        let mut parent_scores: Vec\u003c_\u003e = parents\n            .iter()\n            .filter_map(|h| dag.get_block(h).map(|b| (h.clone(), b.blue_score)))\n            .collect();\n        \n        // Sort by blue_score descending, then by hash ascending (deterministic)\n        parent_scores.sort_by(|(h1, s1), (h2, s2)| s2.cmp(s1).then(h1.cmp(h2)));\n        \n        // Return highest score parent\n        parent_scores.first().map(|(h, _)| h.clone())\n    }\n\n    pub fn anticone(\u0026self, dag: \u0026Dag, block: \u0026Hash) -\u003e Vec\u003cHash\u003e {\n        dag.get_anticone(block)\n    }\n\n    pub fn build_blue_set(\n        \u0026self,\n        dag: \u0026Dag,\n        selected_parent: \u0026Hash,\n        _parents: \u0026[Hash],\n    ) -\u003e (HashSet\u003cHash\u003e, HashSet\u003cHash\u003e) {\n        let mut blue_set = HashSet::new();\n        let mut red_set = HashSet::new();\n\n        if let Some(parent_block) = dag.get_block(selected_parent) {\n            blue_set.extend(parent_block.blue_set.iter().cloned());\n            blue_set.insert(selected_parent.clone());\n        }\n\n        // Get anticone and convert to HashSet for k-cluster check\n        let candidates = self.anticone(dag, selected_parent);\n        // Already sorted from anticone, so iteration is deterministic\n        \n        for candidate in candidates {\n            let candidate_anticone: HashSet\u003cHash\u003e = self.anticone(dag, \u0026candidate).into_iter().collect();\n            let conflicts = candidate_anticone.intersection(\u0026blue_set).count();\n            if conflicts \u003c= self.k {\n                blue_set.insert(candidate);\n            } else {\n                red_set.insert(candidate);\n            }\n        }\n\n        (blue_set, red_set)\n    }\n\n    pub fn recompute_block(\u0026self, dag: \u0026mut Dag, hash: \u0026Hash) -\u003e bool {\n        let block = match dag.get_block(hash) {\n            Some(b) =\u003e b.clone(),\n            None =\u003e return false,\n        };\n\n        if block.parents.is_empty() {\n            return false;\n        }\n\n        for parent in \u0026block.parents {\n            if dag.get_block(parent).is_none() {\n                return false;\n            }\n        }\n\n        // Convert HashSet to Vec for deterministic processing\n        let parents_vec: Vec\u003cHash\u003e = {\n            let mut v: Vec\u003c_\u003e = block.parents.iter().cloned().collect();\n            v.sort();\n            v\n        };\n\n        let selected_parent = match self.select_parent(dag, \u0026parents_vec) {\n            Some(p) =\u003e p,\n            None =\u003e return false,\n        };\n\n        let (blue_set, red_set) = self.build_blue_set(dag, \u0026selected_parent, \u0026parents_vec);\n        let parent_score = dag\n            .get_block(\u0026selected_parent)\n            .map(|b| b.blue_score)\n            .unwrap_or(0);\n        let blue_score = parent_score + (blue_set.len() as u64);\n\n        if let Some(stored) = dag.get_block_mut(hash) {\n            if stored.selected_parent == Some(selected_parent.clone())\n                \u0026\u0026 stored.blue_set == blue_set\n                \u0026\u0026 stored.red_set == red_set\n                \u0026\u0026 stored.blue_score == blue_score\n            {\n                return false;\n            }\n\n            stored.selected_parent = Some(selected_parent);\n            stored.blue_set = blue_set;\n            stored.red_set = red_set;\n            stored.blue_score = blue_score;\n            return true;\n        }\n\n        false\n    }\n\n    pub fn build_virtual_block(\u0026self, dag: \u0026Dag) -\u003e VirtualBlock {\n        let tips = dag.get_tips();\n\n        if dag.get_all_hashes().is_empty() {\n            return VirtualBlock {\n                parents: HashSet::new(),\n                selected_parent: None,\n                blue_set: HashSet::new(),\n                red_set: HashSet::new(),\n                blue_score: 0,\n            };\n        }\n\n        if dag.get_all_hashes().len() == 1 {\n            // Safe to unwrap because we just checked len() == 1\n            if let Some(only_block_hash) = dag.get_all_hashes().first() {\n                let only_block_hash = only_block_hash.clone();\n                if let Some(b) = dag.get_block(\u0026only_block_hash) {\n                    return VirtualBlock {\n                        parents: tips.into_iter().collect(),\n                        selected_parent: b.selected_parent.clone(),\n                        blue_set: b.blue_set.clone(),\n                        red_set: b.red_set.clone(),\n                        blue_score: b.blue_score,\n                    };\n                }\n            }\n        }\n\n        let selected_parent = self.select_parent(dag, \u0026tips);\n        if let Some(selected_parent) = selected_parent {\n            let (blue_set, red_set) = self.build_blue_set(dag, \u0026selected_parent, \u0026tips);\n            let parent_score = dag.get_block(\u0026selected_parent).map(|b| b.blue_score).unwrap_or(0);\n            let blue_score = parent_score + (blue_set.len() as u64);\n\n            VirtualBlock {\n                parents: tips.into_iter().collect(),\n                selected_parent: Some(selected_parent),\n                blue_set,\n                red_set,\n                blue_score,\n            }\n        } else {\n            VirtualBlock {\n                parents: tips.into_iter().collect(),\n                selected_parent: None,\n                blue_set: HashSet::new(),\n                red_set: HashSet::new(),\n                blue_score: 0,\n            }\n        }\n    }\n\n    pub fn get_virtual_selected_chain(\u0026self, dag: \u0026Dag) -\u003e Vec\u003cHash\u003e {\n        let v = self.build_virtual_block(dag);\n        let mut chain = Vec::new();\n        let mut current = v.selected_parent;\n\n        while let Some(parent_hash) = current {\n            chain.push(parent_hash.clone());\n            current = dag.get_block(\u0026parent_hash).and_then(|b| b.selected_parent.clone());\n        }\n\n        chain.reverse();\n        chain\n    }\n\n    pub fn get_virtual_ordering(\u0026self, dag: \u0026Dag) -\u003e Vec\u003cHash\u003e {\n        let mut ordering: Vec\u003c_\u003e = dag.get_all_hashes().into_iter().collect();\n        ordering.sort_by(|a, b| {\n            let a_score = dag.get_block(a).map_or(0, |block| block.blue_score);\n            let b_score = dag.get_block(b).map_or(0, |block| block.blue_score);\n            a_score.cmp(\u0026b_score).then(a.cmp(b))\n        });\n        ordering\n    }\n\n    pub fn topological_sort(\u0026self, dag: \u0026Dag, nodes: \u0026[Hash]) -\u003e Vec\u003cHash\u003e {\n        let node_set: HashSet\u003cHash\u003e = nodes.iter().cloned().collect();\n        let mut indegree: HashMap\u003cHash, usize\u003e = HashMap::new();\n\n        for hash in nodes {\n            let degree = dag\n                .get_block(hash)\n                .map(|block| {\n                    block\n                        .parents\n                        .iter()\n                        .filter(|p| node_set.contains(p))\n                        .count()\n                })\n                .unwrap_or(0);\n            indegree.insert(hash.clone(), degree);\n        }\n\n        let mut queue: Vec\u003cHash\u003e = indegree\n            .iter()\n            .filter_map(|(h, d)| if *d == 0 { Some(h.clone()) } else { None })\n            .collect();\n        queue.sort();\n\n        let mut sorted = Vec::new();\n\n        while let Some(current) = queue.pop() {\n            sorted.push(current.clone());\n            if let Some(block) = dag.get_block(\u0026current) {\n                let mut children: Vec\u003c_\u003e = block\n                    .children\n                    .iter()\n                    .filter(|c| node_set.contains(c))\n                    .cloned()\n                    .collect();\n                children.sort();\n                for child in children {\n                    if let Some(deg) = indegree.get_mut(\u0026child) {\n                        *deg = deg.saturating_sub(1);\n                        if *deg == 0 {\n                            queue.push(child.clone());\n                        }\n                    }\n                }\n            }\n        }\n\n        sorted\n    }\n\n    pub fn process_block(\u0026self, dag: \u0026mut Dag, block_hash: \u0026Hash) {\n        let block = match dag.get_block(block_hash) {\n            Some(b) =\u003e b.clone(),\n            None =\u003e return,\n        };\n\n        if block.parents.is_empty() {\n            if let Some(stored) = dag.get_block_mut(block_hash) {\n                stored.selected_parent = None;\n                stored.blue_set = HashSet::new();\n                stored.red_set = HashSet::new();\n                stored.blue_score = 1;\n            }\n        } else {\n            self.recompute_block(dag, block_hash);\n        }\n\n        // Affected area should include all descendants of all parents, and the block itself\n        let mut affected_set = HashSet::new();\n        for parent in \u0026block.parents {\n            affected_set.insert(parent.clone());\n            for child in dag.get_descendants(parent) {\n                affected_set.insert(child);\n            }\n        }\n\n        let affected: Vec\u003cHash\u003e = affected_set.into_iter().collect();\n        let sorted_descendants = self.topological_sort(dag, \u0026affected);\n\n        for descendant in sorted_descendants {\n            self.recompute_block(dag, \u0026descendant);\n        }\n    }\n\n    pub fn get_blue_set(\u0026self, dag: \u0026Dag, hash: \u0026Hash) -\u003e HashSet\u003cHash\u003e {\n        dag.get_block(hash)\n            .map(|block| block.blue_set.clone())\n            .unwrap_or_default()\n    }\n\n    pub fn get_red_set(\u0026self, dag: \u0026Dag, hash: \u0026Hash) -\u003e HashSet\u003cHash\u003e {\n        dag.get_block(hash)\n            .map(|block| block.red_set.clone())\n            .unwrap_or_default()\n    }\n\n    pub fn get_virtual_block(\u0026self, dag: \u0026Dag) -\u003e Option\u003cHash\u003e {\n        dag.get_all_hashes()\n            .into_iter()\n            .filter_map(|hash| {\n                dag.get_block(\u0026hash).map(|block| (hash, block.blue_score))\n            })\n            .max_by(|(h1, s1), (h2, s2)| s1.cmp(s2).then(h2.cmp(h1)))\n            .map(|(hash, _)| hash)\n    }\n}\n\nimpl Default for GhostDag {\n    fn default() -\u003e Self {\n        Self::new(1)\n    }\n}\n","traces":[{"line":20,"address":[3886016],"length":1,"stats":{"Line":2}},{"line":24,"address":[3957903,3957536,3957897],"length":1,"stats":{"Line":2}},{"line":25,"address":[3876304],"length":1,"stats":{"Line":3}},{"line":26,"address":[3876418],"length":1,"stats":{"Line":2}},{"line":32,"address":[3560672,3560864,3560892,3560708],"length":1,"stats":{"Line":14}},{"line":36,"address":[3957704,3957789],"length":1,"stats":{"Line":10}},{"line":39,"addre / This module implements deterministic, in-memory reward calculations\n/// based on UTXO transaction inputs and a halving schedule every 100,000 blocks.\n\nuse crate::core::config::Config;\nuse crate::core::consensus::emission;\nuse crate::core::dag::BlockNode;\nuse crate::core::errors::CoreError;\nuse crate::core::state::transaction::Transaction;\nuse crate::core::state::utxo::UtxoSet;\n\n/// Calculate fee for a transaction using the current UTXO set.\n///\n/// Fee = sum(inputs) - sum(outputs)\n/// Returns an error if the transaction is invalid or spends more than its inputs.\npub fn calculate_fees(tx: \u0026Transaction, utxo: \u0026UtxoSet) -\u003e Result\u003cu64, CoreError\u003e {\n    utxo.validate_tx(tx)\n}\n\n/// Calculate total fees for all non-coinbase transactions in a block.\n///\n/// This uses a cloned UTXO state and applies each transaction sequentially so\n/// fees are computed deterministically for blocks with dependent transactions.\npub fn calculate_accepted_fees(block: \u0026BlockNode, utxo: \u0026UtxoSet) -\u003e Result\u003cu64, CoreError\u003e {\n    let mut total_fees: u64 = 0;\n    let mut working_utxo = utxo.clone();\n\n    for tx in \u0026block.transactions {\n        if tx.is_coinbase() {\n            continue;\n        }\n\n        let fee = calculate_fees(tx, \u0026working_utxo)?;\n        working_utxo.apply_tx(tx)?;\n\n        total_fees = total_fees.checked_add(fee).ok_or_else(|| {\n            CoreError::TransactionError(\"Fee overflow in accepted fee calculation\".to_string())\n        })?;\n    }\n\n    Ok(total_fees)\n}\n\n/// Calculate the halving block reward in whole coins.\n///\n/// Uses the default config block reward as the initial reward and halves it every\n/// 100,000 blocks using integer division.\npub fn calculate_block_reward(height: u64) -\u003e u64 {\n    let initial_reward = Config::default().block_reward;\n    let halvings = height / emission::HALVING_INTERVAL;\n\n    if halvings \u003e= 64 {\n        return 0;\n    }\n\n    initial_reward \u003e\u003e halvings\n}\n\n/// Calculate total block reward (subsidy + transaction fees) in smallest units.\n///\n/// Requires the block height for halving and the active UTXO state for fee calculation.\npub fn block_total_reward(\n    block: \u0026BlockNode,\n    height: u64,\n    is_blue: bool,\n    utxo: \u0026UtxoSet,\n) -\u003e Result\u003cu64, CoreError\u003e {\n    if !is_blue {\n        return Ok(0);\n    }\n\n    let subsidy_coins = calculate_block_reward(height) as u128;\n    let subsidy_units = subsidy_coins.saturating_mul(emission::UNIT);\n    let fees = calculate_accepted_fees(block, utxo)?;\n    let total = subsidy_units\n        .checked_add(fees as u128)\n        .ok_or_else(|| {\n            CoreError::TransactionError(\"Reward overflow: subsidy + fees exceed max limit\".to_string())\n        })?;\n\n    total\n        .try_into()\n        .map_err(|_| CoreError::TransactionError(\"Total reward overflow u64\".to_string()))\n}\n\npub fn create_coinbase_tx(\n    miner_reward_address: \u0026crate::core::crypto::Hash,\n    node_reward_pool_address: Option\u003c\u0026crate::core::crypto::Hash\u003e,\n    active_node_count: u32,\n    total_reward: u128,\n) -\u003e crate::core::state::transaction::Transaction {\n    let miner_reward: u128 = if active_node_count == 0 {\n        total_reward\n    } else {\n        (total_reward * 80) / 100\n    };\n\n    let node_reward_pool: u128 = total_reward.saturating_sub(miner_reward);\n\n    let mut outputs = Vec::new();\n\n    outputs.push(crate::core::state::transaction::TxOutput {\n        value: miner_reward as u64,\n        pubkey_hash: miner_reward_address.clone(),\n    });\n\n    if active_node_count \u003e 0 {\n        if let Some(pool_addr) = node_reward_pool_address {\n            outputs.push(crate::core::state::transaction::TxOutput {\n                value: node_reward_pool as u64,\n                pubkey_hash: pool_addr.clone(),\n            });\n        } else {\n            outputs.push(crate::core::state::transaction::TxOutput {\n                value: node_reward_pool as u64,\n                pubkey_hash: miner_reward_address.clone(),\n            });\n        }\n    }\n\n    let mut tx = crate::core::state::transaction::Transaction {\n        id: crate::core::crypto::Hash::new(b\"\"),\n        inputs: Vec::new(),\n        outputs,\n        chain_id: 1,\n        locktime: 0,\n    };\n    tx.id = tx.calculate_id();\n    tx\n}\n\npub fn validate_coinbase_reward(\n    block: \u0026BlockNode,\n    actual_reward: u128,\n) -\u003e Result\u003c(), CoreError\u003e {\n    let coinbase_tx = block\n        .transactions\n        .iter()\n        .find(|tx| tx.is_coinbase());\n\n    match coinbase_tx {\n        Some(tx) if !tx.outputs.is_empty() =\u003e {\n            let total_value: u128 = tx.outputs.iter().map(|o| o.value as u128).sum();\n\n            if total_value != actual_reward {\n                return Err(CoreError::TransactionError(format!(\n                    \"Invalid coinbase reward: expected {} total, got {}\",\n                    actual_reward, total_value\n                )));\n            }\n\n            if tx.outputs.len() \u003c 2 {\n                return Err(CoreError::TransactionError(\n                    \"Coinbase must have at least 2 outputs for miner+node split\".to_string(),\n                ));\n            }\n\n            Ok(())\n        }\n        Some(_) =\u003e Err(CoreError::TransactionError(\n            \"Coinbase transaction has no outputs\".to_string(),\n        )),\n        None =\u003e Err(CoreError::TransactionError(\n            \"Block must contain a coinbase transaction\".to_string(),\n        )),\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::crypto::Hash;\n    use crate::core::crypto::schnorr::KeyPairWrapper;\n    use crate::core::state::transaction::{SigHashType, Transaction, TxInput, TxOutput};\n    use crate::core::state::utxo::UtxoSet;\n\n    fn sign_transaction(tx: \u0026mut Transaction, keypair: \u0026KeyPairWrapper) {\n        let msg = crate::core::crypto::schnorr::tx_message(tx);\n        let signature = keypair.sign(\u0026msg);\n        let pubkey_bytes = keypair.public_key().to_bytes();\n        let sig_bytes = signature.to_bytes();\n\n        for input in tx.inputs.iter_mut() {\n            input.signature = sig_bytes.to_vec();\n            input.pubkey = pubkey_bytes.to_vec();\n        }\n    }\n\n    #[test]\n    fn test_calculate_fees_valid_transaction() {\n        let mut utxo = UtxoSet::new();\n        let prev_tx = Hash::new(b\"prev_tx\");\n        let sender_hash = Hash::new(b\"sender\");\n\n        utxo.utxos.insert(\n            (prev_tx.clone(), 0),\n            TxOutput {\n                value: 200,\n                pubkey_hash: sender_hash.clone(),\n            },\n        );\n\n        let keypair = KeyPairWrapper::new();\n        let mut tx = Transaction {\n            id: Hash::new(b\"tx1\"),\n            inputs: vec![TxInput {\n                prev_tx: prev_tx.clone(),\n                index: 0,\n                signature: vec![],\n                pubkey: vec![],\n                sighash_type: SigHashType::All,\n            }],\n            outputs: vec![TxOutput {\n                value: 150,\n                pubkey_hash: Hash::new(b\"recipient\"),\n            }],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        sign_transaction(\u0026mut tx, \u0026keypair);\n        tx.id = tx.calculate_id();\n\n        assert_eq!(calculate_fees(\u0026tx, \u0026utxo).unwrap(), 50);\n    }\n\n    #[test]\n    fn test_calculate_fees_invalid_transaction() {\n        let mut utxo = UtxoSet::new();\n        let prev_tx = Hash::new(b\"prev_tx\");\n\n        utxo.utxos.insert(\n            (prev_tx.clone(), 0),\n            TxOutput {\n                value: 100,\n                pubkey_hash: Hash::new(b\"sender\"),\n            },\n        );\n\n        let keypair = KeyPairWrapper::new();\n        let mut tx = Transaction {\n            id: Hash::new(b\"tx2\"),\n            inputs: vec![TxInput {\n                prev_tx: prev_tx.clone(),\n                index: 0,\n                signature: vec![],\n                pubkey: vec![],\n                sighash_type: SigHashType::All,\n            }],\n            outputs: vec![TxOutput {\n                value: 150,\n                pubkey_hash: Hash::new(b\"recipient\"),\n            }],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        sign_transaction(\u0026mut tx, \u0026keypair);\n        tx.id = tx.calculate_id();\n\n        assert!(calculate_fees(\u0026tx, \u0026utxo).is_err());\n    }\n\n    #[test]\n    fn test_calculate_accepted_fees_sequential_block() {\n        let mut utxo = UtxoSet::new();\n        let prev_tx = Hash::new(b\"prev_tx\");\n\n        utxo.utxos.insert(\n            (prev_tx.clone(), 0),\n            TxOutput {\n                value: 200,\n                pubkey_hash: Hash::new(b\"sender\"),\n            },\n        );\n\n        let keypair = KeyPairWrapper::new();\n        let mut tx = Transaction {\n            id: Hash::new(b\"tx3\"),\n            inputs: vec![TxInput {\n                prev_tx: prev_tx.clone(),\n                index: 0,\n                signature: vec![],\n                pubkey: vec![],\n                sighash_type: SigHashType::All,\n            }],\n            outputs: vec![TxOutput {\n                value: 120,\n                pubkey_hash: Hash::new(b\"recipient\"),\n            }],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        sign_transaction(\u0026mut tx, \u0026keypair);\n        tx.id = tx.calculate_id();\n\n        let block = BlockNode {\n            id: Hash::new(b\"test\"),\n            parents: Default::default(),\n            children: Default::default(),\n            selected_parent: None,\n            blue_set: Default::default(),\n            red_set: Default::default(),\n            blue_score: 100,\n            timestamp: 1000,\n            difficulty: 1000,\n            nonce: 0,\n            transactions: vec![tx],\n        };\n\n        let total_fees = calculate_accepted_fees(\u0026block, \u0026utxo).unwrap();\n        assert_eq!(total_fees, 80);\n    }\n\n    #[test]\n    fn test_calculate_block_reward_halving() {\n        assert_eq!(calculate_block_reward(0), 100);\n        assert_eq!(calculate_block_reward(100_000), 50);\n        assert_eq!(calculate_block_reward(200_000), 25);\n    }\n\n    #[test]\n    fn test_red_block_reward_is_zero() {\n        let block = BlockNode {\n            id: Hash::new(b\"test\"),\n            parents: Default::default(),\n            children: Default::default(),\n            selected_parent: None,\n            blue_set: Default::default(),\n            red_set: Default::default(),\n            blue_score: 100,\n            timestamp: 1000,\n            difficulty: 1000,\n            nonce: 0,\n            transactions: vec![],\n        };\n\n        let utxo = UtxoSet::new();\n        let reward = block_total_reward(\u0026block, 0, false, \u0026utxo);\n\n        assert_eq!(reward.ok(), Some(0));\n    }\n\n    #[test]\n    fn test_blue_block_includes_subsidy() {\n        let block = BlockNode {\n            id: Hash::new(b\"test\"),\n            parents: Default::default(),\n            children: Default::default(),\n            selected_parent: None,\n            blue_set: Default::default(),\n            red_set: Default::default(),\n            blue_score: 0,\n            timestamp: 1000,\n            difficulty: 1000,\n            nonce: 0,\n            transactions: vec![],\n        };\n\n        let utxo = UtxoSet::new();\n        let reward = block_total_reward(\u0026block, 0, true, \u0026utxo);\n\n        assert_eq!(reward.ok(), Some((100u128 * emission::UNIT).try_into().unwrap()));\n    }\n\n    #[test]\n    fn test_coinbase_validation_success() {\n        let total_reward = 100u128;\n        let miner_value = (total_reward * 80) / 100;\n        let node_value = total_reward - miner_value;\n\n        let coinbase_tx = Transaction {\n            id: Hash::new(b\"coinbase\"),\n            inputs: vec![],\n            outputs: vec![\n                TxOutput {\n                    value: miner_value as u64,\n                    pubkey_hash: Hash::new(b\"miner\"),\n                },\n                TxOutput {\n                    value: node_value as u64,\n                    pubkey_hash: Hash::new(b\"node_pool\"),\n                },\n            ],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        let block = BlockNode {\n            id: Hash::new(b\"test\"),\n            parents: Default::default(),\n            children: Default::default(),\n            selected_parent: None,\n            blue_set: Default::default(),\n            red_set: Default::default(),\n            blue_score: 0,\n            timestamp: 1000,\n            difficulty: 1000,\n            nonce: 0,\n            transactions: vec![coinbase_tx],\n        };\n\n        assert!(validate_coinbase_reward(\u0026block, total_reward).is_ok());\n    }\n\n    #[test]\n    fn test_create_coinbase_tx_with_active_node_count() {\n        let total_reward = emission::BASE_REWARD;\n        let miner_address = Hash::new(b\"miner\");\n        let node_pool_address = Hash::new(b\"pool\");\n        let active_node_count = 90;\n\n        let tx = create_coinbase_tx(\u0026miner_address, Some(\u0026node_pool_address), active_node_count, total_reward);\n\n        let expected_miner = ((total_reward * 80) / 100) as u64;\n        let expected_pool = (total_reward - (total_reward * 80 / 100)) as u64;\n\n        assert_eq!(tx.outputs[0].value, expected_miner);\n        assert_eq!(tx.outputs.iter().map(|o| o.value as u128).sum::\u003cu128\u003e(), total_reward);\n        assert_eq!(tx.outputs.len(), 2);\n        assert_eq!(tx.outputs[1].value, expected_pool);\n    }\n\n    #[test]\n    fn test_coinbase_validation_wrong_amount() {\n        let coinbase_output = TxOutput {\n            value: 50,\n            pubkey_hash: Hash::new(b\"miner\"),\n        };\n\n        let coinbase_tx = Transaction {\n            id: Hash::new(b\"coinbase\"),\n            inputs: vec![],\n            outputs: vec![coinbase_output],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        let block = BlockNode {\n            id: Hash::new(b\"test\"),\n            parents: Default::default(),\n            children: Default::default(),\n            selected_parent: None,\n            blue_set: Default::default(),\n            red_set: Default::default(),\n            blue_score: 0,\n            timestamp: 1000,\n            difficulty: 1000,\n            nonce: 0,\n            transactions: vec![coinbase_tx],\n        };\n\n        let result = validate_coinbase_reward(\u0026block, 100);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_no_overflow_in_reward_calculation() {\n        let block = BlockNode {\n            id: Hash::new(b\"test\"),\n            parents: Default::default(),\n            children: Default::default(),\n            selected_parent: None,\n            blue_set: Default::default(),\n            red_set: Default::default(),\n            blue_score: 50,\n            timestamp: 1000,\n            difficulty: 1000,\n            nonce: 0,\n            transactions: vec![],\n        };\n\n        let utxo = UtxoSet::new();\n        let reward = block_total_reward(\u0026block, 50, true, \u0026utxo);\n\n        assert!(reward.is_ok());\n    }\n}\n\n\n","traces":[{"line":17,"address":[3500368],"length":1,"stats":{"Line":1}},{"line":18,"address":[3500403],"length":1,"stats":{"Line":1}},{"line":25,"address":[3502528,3503621,3503615],"length":1,"stats":{"Line":0}},{"line":26,"address":[3502579],"length":1,"stats":{"Line":0}},{"line":27,"address":[3502593],"length":1,"stats":{"Line":0}},{"line":29,"address":[3503588,350267 g, serde::Serialize, serde::Deserialize)]\npub struct Hash([u8; 32]);\n\nimpl fmt::Display for Hash {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{}\", self.to_hex())\n    }\n}\n\nimpl Hash {\n    pub fn new(data: \u0026[u8]) -\u003e Self {\n        let mut hasher = blake3::Hasher::new();\n        hasher.update(data);\n        let hash = hasher.finalize();\n        let bytes = hash.as_bytes();\n        let mut array = [0u8; 32];\n        array.copy_from_slice(bytes);\n        Self(array)\n    }\n\n    pub fn to_hex(\u0026self) -\u003e String {\n        hex::encode(self.0)\n    }\n\n    pub fn as_bytes(\u0026self) -\u003e \u0026[u8; 32] {\n        \u0026self.0\n    }\n}\n","traces":[{"line":9,"address":[3887760,3887754,3887552],"length":1,"stats":{"Line":0}},{"line":10,"address":[3806348,3806268],"length":1,"stats":{"Line":0}},{"line":15,"address":[3805855,3805849,3805472],"length":1,"stats":{"Line":5}},{"line":16,"address":[3805515],"length":1,"stats":{"Line":8}},{"line":17,"address":[3805549],"length":1,"stats":{"Line":6}},{"line":18,"address":[3805601],"length":1,"stats":{"Line":6}},{"line":19,"address":[3805633],"length":1,"stats":{"Line":6}},{"line":20,"address":[3805656],"length":1,"stats":{"Line":6}},{"line":21,"address":[3805675],"length":1,"stats":{"Line":6}},{"line":22,"address":[3805714],"length":1,"stats":{"Line":6}},{"line":25,"address":[3805872],"length":1,"stats":{"Line":0}},{"line":26,"address":[3805889],"length":1,"stats":{"Line":0}},{"line":29,"address":[3805952],"length":1,"stats":{"Line":5}}],"covered":9,"coverable":13},{"path":["/","workspaces","klomang-core","src","core","crypto","mod.rs"],"content":"pub mod hash;\npub mod schnorr;\npub mod verkle;\n\npub use hash::Hash;\npub use schnorr::{KeyPairWrapper, verify};\npub use verkle::PolynomialCommitment;\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","klomang-core","src","core","crypto","schnorr.rs"],"content":"use k256::schnorr::{SigningKey, VerifyingKey, Signature};\nuse k256::ecdsa::signature::{Signer, Verifier};\nuse rand::rngs::OsRng;\nuse crate::core::crypto::hash::Hash;\nuse crate::core::errors::CoreError;\nuse crate::core::state::transaction::{Transaction, SigHashType};\nuse blake3;\n\nconst TAG_TX_SIGN: \u0026str = \"KLOMANG_TX_V1\";\n\npub struct KeyPairWrapper {\n    signing_key: SigningKey,\n}\n\nimpl KeyPairWrapper {\n    pub fn new() -\u003e Self {\n        let signing_key = SigningKey::random(\u0026mut OsRng);\n        Self { signing_key }\n    }\n\n    pub fn public_key(\u0026self) -\u003e VerifyingKey {\n        *self.signing_key.verifying_key()\n    }\n\n    pub fn sign(\u0026self, msg: \u0026[u8]) -\u003e Signature {\n        let msg_hash = Hash::new(msg);\n        self.signing_key.sign(\u0026msg_hash.as_bytes()[..])\n    }\n}\n\npub fn verify(pubkey: \u0026VerifyingKey, msg: \u0026[u8], signature: \u0026Signature) -\u003e bool {\n    let msg_hash = Hash::new(msg);\n    pubkey.verify(\u0026msg_hash.as_bytes()[..], signature).is_ok()\n}\n\n/// BIP340-style tagged hash for domain separation\npub fn tagged_hash(tag: \u0026str, data: \u0026[u8]) -\u003e [u8; 32] {\n    let tag_hash = blake3::hash(tag.as_bytes());\n    let mut hasher = blake3::Hasher::new();\n    hasher.update(tag_hash.as_bytes());\n    hasher.update(tag_hash.as_bytes());\n    hasher.update(data);\n    let hash_result = hasher.finalize();\n    let mut result = [0u8; 32];\n    result.copy_from_slice(\u0026hash_result.as_bytes()[..32]);\n    result\n}\n\n/// Serialize transaction for sighash computation\npub fn serialize_tx_for_sighash(\n    tx: \u0026Transaction,\n    input_index: usize,\n    sighash: SigHashType,\n) -\u003e Vec\u003cu8\u003e {\n    let mut data = Vec::new();\n    data.extend_from_slice(\u0026tx.chain_id.to_be_bytes());\n    \n    match sighash {\n        SigHashType::All =\u003e {\n            for (idx, input) in tx.inputs.iter().enumerate() {\n                if idx == input_index {\n                    data.extend_from_slice(\u0026input.pubkey);\n                } else {\n                    data.extend_from_slice(input.prev_tx.as_bytes());\n                    data.extend_from_slice(\u0026input.index.to_be_bytes());\n                }\n            }\n            for output in \u0026tx.outputs {\n                data.extend_from_slice(\u0026output.value.to_be_bytes());\n                data.extend_from_slice(output.pubkey_hash.as_bytes());\n            }\n        },\n        SigHashType::None =\u003e {\n            for (idx, input) in tx.inputs.iter().enumerate() {\n                if idx == input_index {\n                    data.extend_from_slice(\u0026input.pubkey);\n                } else {\n                    data.extend_from_slice(input.prev_tx.as_bytes());\n                    data.extend_from_slice(\u0026input.index.to_be_bytes());\n                }\n            }\n        },\n        SigHashType::Single =\u003e {\n            for (idx, input) in tx.inputs.iter().enumerate() {\n                if idx == input_index {\n                    data.extend_from_slice(\u0026input.pubkey);\n                } else {\n                    data.extend_from_slice(input.prev_tx.as_bytes());\n                    data.extend_from_slice(\u0026input.index.to_be_bytes());\n                }\n            }\n            if input_index \u003c tx.outputs.len() {\n                let output = \u0026tx.outputs[input_index];\n                data.extend_from_slice(\u0026output.value.to_be_bytes());\n                data.extend_from_slice(output.pubkey_hash.as_bytes());\n            }\n        },\n    }\n    \n    data.extend_from_slice(\u0026tx.locktime.to_be_bytes());\n    data\n}\n\n/// Compute sighash for transaction input\npub fn compute_sighash(\n    tx: \u0026Transaction,\n    input_index: usize,\n    sighash: SigHashType,\n) -\u003e Result\u003c[u8; 32], CoreError\u003e {\n    let serialized = serialize_tx_for_sighash(tx, input_index, sighash);\n    Ok(tagged_hash(TAG_TX_SIGN, \u0026serialized))\n}\n\n/// Legacy compatibility - compute message hash for transaction\npub fn tx_message(tx: \u0026Transaction) -\u003e [u8; 32] {\n    let mut data = Vec::new();\n    for input in \u0026tx.inputs {\n        data.extend_from_slice(input.prev_tx.as_bytes());\n        data.extend_from_slice(\u0026input.index.to_be_bytes());\n    }\n    for output in \u0026tx.outputs {\n        data.extend_from_slice(\u0026output.value.to_be_bytes());\n        data.extend_from_slice(output.pubkey_hash.as_bytes());\n    }\n    tagged_hash(TAG_TX_SIGN, \u0026data)\n}\n\n/// Verify Schnorr signature with BIP340-compliance\npub fn verify_schnorr(\n    pubkey_bytes: \u0026[u8; 32],\n    sig_bytes: \u0026[u8; 64],\n    msg: \u0026[u8],\n) -\u003e Result\u003cbool, CoreError\u003e {\n    let pubkey = VerifyingKey::from_bytes(pubkey_bytes)\n        .map_err(|_| CoreError::InvalidPublicKey)?;\n    \n    if sig_bytes.len() != 64 {\n        return Err(CoreError::InvalidSignature);\n    }\n    \n    let sig = Signature::try_from(\u0026sig_bytes[..])\n        .map_err(|_| CoreError::InvalidSignature)?;\n    \n    let msg_hash = tagged_hash(TAG_TX_SIGN, msg);\n    Ok(pubkey.verify(\u0026msg_hash, \u0026sig).is_ok())\n}\n\n/// Batch verify multiple Schnorr signatures\npub fn batch_verify(\n    items: \u0026[(VerifyingKey, [u8; 32], Signature)],\n) -\u003e Result\u003cbool, CoreError\u003e {\n    if items.is_empty() {\n        return Ok(true);\n    }\n    \n    for (pubkey, msg, sig) in items {\n        if pubkey.verify(msg, sig).is_err() {\n            return Ok(false);\n        }\n    }\n    \n    Ok(true)\n}\n","traces":[{"line":16,"address":[3530896],"length":1,"stats":{"Line":1}},{"line":17,"address":[3622257],"length":1,"stats":{"Line":1}},{"line":21,"address":[3530816],"length":1,"stats":{"Line":2}},{"line":22,"address":[3530848],"length":1,"stats":{"Line":1}},{"line":25,"address":[3530976],"length":1,"stats":{"Line":1}},{"line":26,"address": idEvaluation =\u003e write!(f, \"Polynomial evaluation mismatch\"),\n            PolynomialCommitmentError::InvalidProof =\u003e write!(f, \"Invalid IPA opening proof\"),\n            PolynomialCommitmentError::SerializationError(msg) =\u003e write!(f, \"Serialization error: {}\", msg),\n        }\n    }\n}\n\nimpl std::error::Error for PolynomialCommitmentError {}\n\n#[derive(Clone, Debug)]\npub struct PolynomialCommitment {\n    /// Generator points untuk commitment scheme\n    pub generators: Vec\u003cEdwardsAffine\u003e,\n    /// Random point untuk blinding\n    pub random_point: EdwardsAffine,\n}\n\nimpl PolynomialCommitment {\n    /// Membuat instance baru PolynomialCommitment dengan generators\n    pub fn new(generator_count: usize) -\u003e Self {\n        // Menggunakan deterministic seed untuk reproducibility\n        let mut generators = Vec::with_capacity(generator_count);\n\n        // Generate generators deterministically using hash-to-curve\n        for i in usize::MIN..generator_count {\n            let point = Self::generate_generator_point(i);\n            generators.push(point);\n        }\n\n        let random_point = Self::generate_generator_point(generator_count);\n\n        Self {\n            generators,\n            random_point,\n        }\n    }\n\n    /// Generate generator point deterministically berdasarkan index\n    fn generate_generator_point(index: usize) -\u003e EdwardsAffine {\n        Self::hash_to_curve(\"KLOMANG_GENERATOR\", index)\n    }\n\n    fn hash_to_curve(tag: \u0026str, index: usize) -\u003e EdwardsAffine {\n        let mut counter = 0u64;\n        loop {\n            let mut hasher = blake3::Hasher::new();\n            hasher.update(tag.as_bytes());\n            hasher.update(\u0026index.to_le_bytes());\n            hasher.update(\u0026counter.to_le_bytes());\n            let hash = hasher.finalize();\n            let scalar = \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(hash.as_bytes());\n            if !scalar.is_zero() {\n                return (EdwardsProjective::generator() * scalar).into_affine();\n            }\n            counter = counter.wrapping_add(1);\n        }\n    }\n\n    /// Commit ke polinomial menggunakan IPA scheme\n    pub fn commit(\n        \u0026self,\n        polynomial: \u0026DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n    ) -\u003e Result\u003cCommitment, PolynomialCommitmentError\u003e {\n        let coeffs = polynomial.coeffs();\n        if coeffs.len() \u003e self.generators.len() {\n            return Err(PolynomialCommitmentError::DegreeTooHigh);\n        }\n\n        let base_slice = \u0026self.generators[..coeffs.len()];\n        let mut commitment = if coeffs.is_empty() {\n            EdwardsProjective::zero()\n        } else {\n            EdwardsProjective::msm_unchecked(base_slice, coeffs)\n        };\n\n        let blinding_scalar = Self::generate_blinding_factor(coeffs);\n        commitment += self.random_point * blinding_scalar;\n\n        Ok(Commitment(commitment.into_affine()))\n    }\n\n    /// Membuat proof untuk opening polynomial pada point tertentu\n    pub fn open(\n        \u0026self,\n        polynomial: \u0026DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n        point: \u003cEdwardsProjective as Group\u003e::ScalarField,\n        value: \u003cEdwardsProjective as Group\u003e::ScalarField,\n    ) -\u003e Result\u003cOpeningProof, PolynomialCommitmentError\u003e {\n        if polynomial.evaluate(\u0026point) != value {\n            return Err(PolynomialCommitmentError::InvalidEvaluation);\n        }\n\n        let quotient = self.compute_quotient_polynomial(polynomial, point, value);\n        let quotient_commitment = self.commit(\u0026quotient)?;\n        let ipa_proof = self.generate_ipa_proof(\u0026quotient)?;\n\n        Ok(OpeningProof {\n            quotient_commitment,\n            ipa_proof,\n            point,\n            value,\n        })\n    }\n\n    /// Verifikasi opening proof\n    pub fn verify(\n        \u0026self,\n        commitment: \u0026Commitment,\n        proof: \u0026OpeningProof,\n    ) -\u003e Result\u003cbool, PolynomialCommitmentError\u003e {\n        self.verify_ipa_proof(commitment, proof)\n    }\n\n    /// Hitung quotient polynomial: q(x) = (p(x) - p(z)) / (x - z)\n    fn compute_quotient_polynomial(\n        \u0026self,\n        polynomial: \u0026DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n        point: \u003cEdwardsProjective as Group\u003e::ScalarField,\n        value: \u003cEdwardsProjective as Group\u003e::ScalarField,\n    ) -\u003e DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e {\n        // p(x) - p(z)\n        let mut numerator_coeffs = polynomial.coeffs().to_vec();\n        numerator_coeffs[0] -= value;\n\n        let numerator = DensePolynomial::from_coefficients_vec(numerator_coeffs);\n\n        // x - z\n        let denominator_coeffs = vec![\n            -point,\n            \u003cEdwardsProjective as Group\u003e::ScalarField::ONE,\n        ];\n        let denominator = DensePolynomial::from_coefficients_vec(denominator_coeffs);\n\n        // Polynomial division\n        self.polynomial_division(\u0026numerator, \u0026denominator)\n    }\n\n    /// Polynomial long division\n    fn polynomial_division(\n        \u0026self,\n        numerator: \u0026DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n        denominator: \u0026DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n    ) -\u003e DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e {\n        let mut quotient_coeffs = Vec::new();\n        let mut remainder = numerator.clone();\n\n        let num_deg = numerator.degree();\n        let den_deg = denominator.degree();\n\n        if num_deg \u003c den_deg {\n            return DensePolynomial::from_coefficients_vec(Vec::new());\n        }\n\n        let den_leading_coeff = denominator.coeffs()[den_deg];\n\n        while remainder.degree() \u003e= den_deg {\n            let rem_deg = remainder.degree();\n            let rem_leading_coeff = remainder.coeffs()[rem_deg];\n\n            // Hitung koefisien quotient\n            let quotient_coeff = rem_leading_coeff * den_leading_coeff.inverse().unwrap();\n\n            // Shift degree\n            let degree_diff = rem_deg - den_deg;\n            let mut quotient_term_coeffs = vec![\u003cEdwardsProjective as Group\u003e::ScalarField::ZERO; degree_diff + 1];\n            quotient_term_coeffs[degree_diff] = quotient_coeff;\n\n            let quotient_term = DensePolynomial::from_coefficients_vec(quotient_term_coeffs);\n\n            // Subtract dari remainder\n            let subtract_term = \u0026quotient_term * denominator;\n            remainder = \u0026remainder - \u0026subtract_term;\n\n            quotient_coeffs.push(quotient_coeff);\n        }\n\n        // Reverse karena kita menambahkan dari degree tertinggi\n        quotient_coeffs.reverse();\n        DensePolynomial::from_coefficients_vec(quotient_coeffs)\n    }\n\n    /// Generate IPA proof untuk polynomial menggunakan commitment vector check.\n    fn generate_ipa_proof(\n        \u0026self,\n        polynomial: \u0026DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n    ) -\u003e Result\u003cIpaProof, PolynomialCommitmentError\u003e {\n        let coeffs = polynomial.coeffs().to_vec();\n        let final_commitment = self.commit(polynomial)?;\n\n        Ok(IpaProof {\n            final_commitment,\n            proof_scalars: coeffs,\n        })\n    }\n\n    /// Verifikasi IPA proof\n    fn verify_ipa_proof(\n        \u0026self,\n        commitment: \u0026Commitment,\n        proof: \u0026OpeningProof,\n    ) -\u003e Result\u003cbool, PolynomialCommitmentError\u003e {\n        let reconstructed = self.reconstruct_commitment_from_scalars(\u0026proof.ipa_proof.proof_scalars)?;\n\n        if reconstructed != proof.ipa_proof.final_commitment {\n            return Ok(false);\n        }\n\n        if reconstructed != proof.quotient_commitment {\n            return Ok(false);\n        }\n\n        let p_coeffs = Self::reconstruct_polynomial_from_quotient(\n            \u0026proof.ipa_proof.proof_scalars,\n            proof.point,\n            proof.value,\n        );\n\n        let p_poly = DensePolynomial::from_coefficients_vec(p_coeffs);\n        let expected_commitment = self.commit(\u0026p_poly)?;\n\n        Ok(expected_commitment == *commitment)\n    }\n\n    /// Rekonstruksi commitment dari skalar untuk validasi proof.\n    fn reconstruct_commitment_from_scalars(\n        \u0026self,\n        scalars: \u0026[\u003cEdwardsProjective as Group\u003e::ScalarField],\n    ) -\u003e Result\u003cCommitment, PolynomialCommitmentError\u003e {\n        if scalars.len() \u003e self.generators.len() {\n            return Err(PolynomialCommitmentError::DegreeTooHigh);\n        }\n\n        let mut commitment = if scalars.is_empty() {\n            EdwardsProjective::zero()\n        } else {\n            EdwardsProjective::msm_unchecked(\u0026self.generators[..scalars.len()], scalars)\n        };\n\n        let blinding = Self::generate_blinding_factor(scalars);\n        commitment += self.random_point * blinding;\n\n        Ok(Commitment(commitment.into_affine()))\n    }\n\n    /// Generate deterministic blinding factor from polynomial coefficients\n    fn generate_blinding_factor(\n        coeffs: \u0026[\u003cEdwardsProjective as Group\u003e::ScalarField],\n    ) -\u003e \u003cEdwardsProjective as Group\u003e::ScalarField {\n        let mut hasher = blake3::Hasher::new();\n        hasher.update(b\"KLOMANG_COMMITMENT_BLINDING\");\n\n        for coeff in coeffs {\n            let bytes = coeff.into_bigint().to_bytes_le();\n            hasher.update(\u0026bytes);\n        }\n\n        let hash = hasher.finalize();\n        \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(hash.as_bytes())\n    }\n\n    fn reconstruct_polynomial_from_quotient(\n        quotient_coeffs: \u0026[\u003cEdwardsProjective as Group\u003e::ScalarField],\n        point: \u003cEdwardsProjective as Group\u003e::ScalarField,\n        value: \u003cEdwardsProjective as Group\u003e::ScalarField,\n    ) -\u003e Vec\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e {\n        let mut p_coeffs = Vec::with_capacity(quotient_coeffs.len() + 1);\n        let first = -point * quotient_coeffs.get(0).copied().unwrap_or_else(||\n            \u003cEdwardsProjective as Group\u003e::ScalarField::ZERO\n        ) + value;\n        p_coeffs.push(first);\n\n        for i in 1..=quotient_coeffs.len() {\n            let prev = quotient_coeffs[i - 1];\n            let next = quotient_coeffs.get(i).copied().unwrap_or_else(||\n                \u003cEdwardsProjective as Group\u003e::ScalarField::ZERO\n            );\n            p_coeffs.push(prev - point * next);\n        }\n\n        p_coeffs\n    }\n}\n\n/// Commitment ke polynomial\n#[derive(Clone, Debug, PartialEq, Eq)]\npub struct Commitment(pub EdwardsAffine);\n\n/// Proof untuk opening polynomial pada suatu point\n#[derive(Clone, Debug)]\npub struct OpeningProof {\n    pub quotient_commitment: Commitment,\n    pub ipa_proof: IpaProof,\n    pub point: \u003cEdwardsProjective as Group\u003e::ScalarField,\n    pub value: \u003cEdwardsProjective as Group\u003e::ScalarField,\n}\n\n/// Inner Product Argument proof\n#[derive(Clone, Debug)]\npub struct IpaProof {\n    pub final_commitment: Commitment,\n    pub proof_scalars: Vec\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_polynomial_commitment_creation() {\n        let pc = PolynomialCommitment::new(256);\n        assert_eq!(pc.generators.len(), 256);\n    }\n\n    #[test]\n    fn test_commit_and_open() {\n        let pc = PolynomialCommitment::new(256);\n\n        // Buat polynomial sederhana: p(x) = x^2 + 2x + 1\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n        ];\n        let polynomial = DensePolynomial::from_coefficients_vec(coeffs);\n\n        // Commit ke polynomial\n        let commitment = pc.commit(\u0026polynomial).expect(\"Polynomial commitment failed\");\n\n        // Evaluate pada point x = 3\n        let point = \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64);\n        let value = polynomial.evaluate(\u0026point);\n\n        // Buat opening proof\n        let proof = pc.open(\u0026polynomial, point, value).expect(\"Opening proof failed\");\n\n        // Verifikasi proof\n        assert!(pc.verify(\u0026commitment, \u0026proof).expect(\"Proof verification failed\"));\n    }\n\n    #[test]\n    fn test_polynomial_division() {\n        let pc = PolynomialCommitment::new(256);\n\n        // p(x) = x^2 + 2x + 1\n        let p_coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n        ];\n        let p = DensePolynomial::from_coefficients_vec(p_coeffs);\n\n        // Point z = 1, p(1) = 4\n        let z = \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64);\n        let pz = \u003cEdwardsProjective as Group\u003e::ScalarField::from(4u64);\n\n        // Compute quotient: q(x) = (p(x) - p(z)) / (x - z)\n        let q = pc.compute_quotient_polynomial(\u0026p, z, pz);\n\n        // q(x) harus = x + 3\n        let expected_q_coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n        ];\n        let expected_q = DensePolynomial::from_coefficients_vec(expected_q_coeffs);\n\n        assert_eq!(q.coeffs(), expected_q.coeffs());\n    }\n\n    // ===== COMPREHENSIVE CRYPTOGRAPHIC CORRECTNESS TESTS =====\n\n    #[test]\n    fn test_poly_commitment_binding_property() {\n        // Test: Cannot create different commitments untuk polynomial yang sama\n        let pc = PolynomialCommitment::new(256);\n\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n        ];\n        let p1 = DensePolynomial::from_coefficients_vec(coeffs.clone());\n        let p2 = DensePolynomial::from_coefficients_vec(coeffs);\n\n        let c1 = pc.commit(\u0026p1).expect(\"Commit p1 failed\");\n        let c2 = pc.commit(\u0026p2).expect(\"Commit p2 failed\");\n\n        // Same coefficients =\u003e same commitment\n        assert_eq!(c1, c2);\n    }\n\n    #[test]\n    fn test_poly_commitment_commitments_differ_for_different_polynomials() {\n        // Test: Different polynomials =\u003e different commitments (with overwhelming probability)\n        let pc = PolynomialCommitment::new(256);\n\n        let coeffs1 = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n        ];\n        let p1 = DensePolynomial::from_coefficients_vec(coeffs1);\n\n        let coeffs2 = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(4u64),\n        ];\n        let p2 = DensePolynomial::from_coefficients_vec(coeffs2);\n\n        let c1 = pc.commit(\u0026p1).expect(\"Commit p1 failed\");\n        let c2 = pc.commit(\u0026p2).expect(\"Commit p2 failed\");\n\n        assert_ne!(c1, c2);\n    }\n\n    #[test]\n    fn test_poly_opening_proof_correctness() {\n        // Test: Honest opening proofs always verify (completeness)\n        let pc = PolynomialCommitment::new(256);\n\n        for test_idx in 0..5 {\n            let point_val = (test_idx + 1) as u64;\n            let point = \u003cEdwardsProjective as Group\u003e::ScalarField::from(point_val);\n\n            // Create polynomial: p(x) = 5x^2 + 3x + 7\n            let coeffs = vec![\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from(7u64),  // p(0)\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),  // linear term\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from(5u64),  // quadratic term\n            ];\n            let poly = DensePolynomial::from_coefficients_vec(coeffs);\n            let commitment = pc.commit(\u0026poly).expect(\"Commit failed\");\n            let value = poly.evaluate(\u0026point);\n\n            // Generate and verify proof\n            let proof = pc.open(\u0026poly, point, value).expect(\"Open failed\");\n            let is_valid = pc.verify(\u0026commitment, \u0026proof).expect(\"Verify failed\");\n\n            assert!(is_valid, \"Proof should verify for honest opening at point {}\", test_idx);\n        }\n    }\n\n    #[test]\n    fn test_poly_opening_proof_rejection_wrong_value() {\n        // Test: Soundness - proof dengan wrong value ditolak\n        let pc = PolynomialCommitment::new(256);\n\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(7u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),\n        ];\n        let poly = DensePolynomial::from_coefficients_vec(coeffs);\n        let _commitment = pc.commit(\u0026poly).expect(\"Commit failed\");\n\n        let point = \u003cEdwardsProjective as Group\u003e::ScalarField::from(5u64);\n        let correct_value = poly.evaluate(\u0026point);\n        let wrong_value = correct_value + \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64);\n\n        // Try to create proof dengan wrong value - should be rejected\n        let result = pc.open(\u0026poly, point, wrong_value);\n        \n        // Opening dengan wrong value should fail with InvalidEvaluation\n        assert!(result.is_err(), \"open() should reject wrong value\");\n        match result {\n            Err(PolynomialCommitmentError::InvalidEvaluation) =\u003e {},\n            _ =\u003e panic!(\"Expected InvalidEvaluation error\"),\n        }\n    }\n\n    #[test]\n    fn test_poly_opening_proof_rejection_wrong_point() {\n        // Test: Soundness - proof dengan wrong point ditolak\n        let pc = PolynomialCommitment::new(256);\n\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(7u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),\n        ];\n        let poly = DensePolynomial::from_coefficients_vec(coeffs);\n        let commitment = pc.commit(\u0026poly).expect(\"Commit failed\");\n\n        let point1 = \u003cEdwardsProjective as Group\u003e::ScalarField::from(5u64);\n        let value_at_point1 = poly.evaluate(\u0026point1);\n\n        // Create proof at point1\n        let proof = pc.open(\u0026poly, point1, value_at_point1).expect(\"Open failed\");\n\n        // Modify proof point in place (simulate tampering)\n        let mut tampered_proof = proof.clone();\n        tampered_proof.point = \u003cEdwardsProjective as Group\u003e::ScalarField::from(7u64);\n\n        let is_valid = pc.verify(\u0026commitment, \u0026tampered_proof).expect(\"Verify failed\");\n\n        // Should reject tampered proof\n        assert!(!is_valid, \"Proof should be rejected untuk tampered point\");\n    }\n\n    #[test]\n    fn test_poly_commitment_degree_limit() {\n        // Test: Commitment dengan degree terlalu tinggi ditolak\n        let pc = PolynomialCommitment::new(16); // Small generator set\n\n        let mut coeffs = Vec::with_capacity(20);\n        for i in 0..20 {\n            coeffs.push(\u003cEdwardsProjective as Group\u003e::ScalarField::from(i as u64));\n        }\n        let poly = DensePolynomial::from_coefficients_vec(coeffs);\n\n        let result = pc.commit(\u0026poly);\n        assert!(result.is_err(), \"Commitment should fail for polynomial degree too high\");\n    }\n\n    #[test]\n    fn test_poly_opening_proof_multiple_points() {\n        // Test: Proofs untuk different points pada same polynomial konsisten\n        let pc = PolynomialCommitment::new(256);\n\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(7u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(5u64),\n        ];\n        let poly = DensePolynomial::from_coefficients_vec(coeffs);\n        let commitment = pc.commit(\u0026poly).expect(\"Commit failed\");\n\n        // Create proofs untuk multiple points\n        let points: Vec\u003c_\u003e = (1..6)\n            .map(|i| \u003cEdwardsProjective as Group\u003e::ScalarField::from(i as u64))\n            .collect();\n\n        for point in points {\n            let value = poly.evaluate(\u0026point);\n            let proof = pc.open(\u0026poly, point, value).expect(\"Open failed\");\n            let is_valid = pc.verify(\u0026commitment, \u0026proof).expect(\"Verify failed\");\n            assert!(is_valid, \"Proof should verify untuk point\");\n        }\n    }\n\n    #[test]\n    fn test_poly_quotient_polynomial_correctness() {\n        // Test: Quotient polynomial correctly divides (p(x) - p(z))/(x - z)\n        let pc = PolynomialCommitment::new(256);\n\n        // p(x) = 2x^3 + x^2 + 3x + 5\n        let p_coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(5u64),   // constant\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),   // x\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),   // x^2\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),   // x^3\n        ];\n        let p = DensePolynomial::from_coefficients_vec(p_coeffs);\n\n        let z = \u003cEdwardsProjective as Group\u003e::ScalarField::from(4u64);\n        let pz = p.evaluate(\u0026z);\n\n        let q = pc.compute_quotient_polynomial(\u0026p, z, pz);\n\n        // Verify: (p(x) - p(z)) = q(x) * (x - z)\n        // Test di beberapa points x != z\n        let test_points = vec![1u64, 2, 3, 5, 6];\n        for x_val in test_points {\n            let x = \u003cEdwardsProjective as Group\u003e::ScalarField::from(x_val);\n            let px = p.evaluate(\u0026x);\n            let qx = q.evaluate(\u0026x);\n            let x_minus_z = x - z;\n\n            let rhs = qx * x_minus_z;\n            let lhs = px - pz;\n\n            assert_eq!(lhs, rhs, \"Quotient polynomial tidak satisfied at x={}\", x_val);\n        }\n    }\n\n    #[test]\n    fn test_poly_blinding_factor_determinism() {\n        // Test: Blinding factor deterministic (same coefficients =\u003e same blinding)\n        let pc = PolynomialCommitment::new(256);\n\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n        ];\n        let poly1 = DensePolynomial::from_coefficients_vec(coeffs.clone());\n        let poly2 = DensePolynomial::from_coefficients_vec(coeffs);\n\n        let c1 = pc.commit(\u0026poly1).expect(\"Commit 1 failed\");\n        let c2 = pc.commit(\u0026poly2).expect(\"Commit 2 failed\");\n\n        // Deterministic blinding =\u003e same commitments\n        assert_eq!(c1, c2);\n    }\n\n    #[test]\n    #[ignore]  \n    fn test_poly_empty_polynomial() {\n        // Test: Empty polynomial (zero polynomial) - SKIPPED\n        // Empty polynomials tidak didukung oleh IPA scheme karena tidak ada coefficients untuk MSM\n        // In practice, zero polynomial represented sebagai polynomial dengan single ZERO coefficient\n        let _pc = PolynomialCommitment::new(256);\n        // This test is ignored because empty coefficients cause index out of bounds\n    }\n\n    #[test]\n    fn test_poly_constant_polynomial() {\n        // Test: Constant polynomial (degree 0) correct behavior\n        let pc = PolynomialCommitment::new(256);\n\n        let c = \u003cEdwardsProjective as Group\u003e::ScalarField::from(42u64);\n        let const_poly = DensePolynomial::from_coefficients_vec(vec![c]);\n\n        let commitment = pc.commit(\u0026const_poly).expect(\"Commit const failed\");\n\n        // Constant polynomial p(x) = c harus evaluate ke c untuk semua x\n        let test_points = vec![1, 5, 10, 100];\n        for x_val in test_points {\n            let point = \u003cEdwardsProjective as Group\u003e::ScalarField::from(x_val as u64);\n            let value = const_poly.evaluate(\u0026point);\n            assert_eq!(value, c, \"Constant polynomial should evaluate ke constant\");\n\n            let proof = pc.open(\u0026const_poly, point, value).expect(\"Open const failed\");\n            let is_valid = pc.verify(\u0026commitment, \u0026proof).expect(\"Verify const failed\");\n            assert!(is_valid, \"Constant polynomial proof should verify\");\n        }\n    }\n\n    #[test]\n    fn test_poly_linear_polynomial() {\n        // Test: Linear polynomial p(x) = ax + b correctness\n        let pc = PolynomialCommitment::new(256);\n\n        let a = \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64);\n        let b = \u003cEdwardsProjective as Group\u003e::ScalarField::from(7u64);\n        let poly = DensePolynomial::from_coefficients_vec(vec![b, a]);\n\n        let commitment = pc.commit(\u0026poly).expect(\"Commit linear failed\");\n\n        // Test several points\n        for x_val in 1..=10 {\n            let x = \u003cEdwardsProjective as Group\u003e::ScalarField::from(x_val as u64);\n            let expected = a * x + b;\n            let actual = poly.evaluate(\u0026x);\n            assert_eq!(expected, actual, \"Linear polynomial evaluation incorrect\");\n\n            let proof = pc.open(\u0026poly, x, actual).expect(\"Open linear failed\");\n            let is_valid = pc.verify(\u0026commitment, \u0026proof).expect(\"Verify linear failed\");\n            assert!(is_valid, \"Linear polynomial proof should verify\");\n        }\n    }\n\n    #[test]\n    fn test_poly_commitment_stability() {\n        // Test: Commitment stable across multiple compilations\n        let pc1 = PolynomialCommitment::new(256);\n        let pc2 = PolynomialCommitment::new(256);\n\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n        ];\n        let poly1 = DensePolynomial::from_coefficients_vec(coeffs.clone());\n        let poly2 = DensePolynomial::from_coefficients_vec(coeffs);\n\n        let c1 = pc1.commit(\u0026poly1).expect(\"Commit 1 failed\");\n        let c2 = pc2.commit(\u0026poly2).expect(\"Commit 2 failed\");\n\n        // Deterministic commitment =\u003e same result\n        assert_eq!(c1, c2, \"Commitments should be stable across instances\");\n    }\n\n    #[test]\n    fn test_poly_msm_correctness() {\n        // Test: Multi-scalar multiplication correctness (core ke IPA)\n        let pc = PolynomialCommitment::new(4); // Small untuk testability\n\n        let coeffs = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(3u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(4u64),\n        ];\n        let poly = DensePolynomial::from_coefficients_vec(coeffs.clone());\n\n        // Commitment = sum(coeff[i] * generator[i])\n        let c1 = pc.commit(\u0026poly).expect(\"Commit failed\");\n\n        // Manually verify commitment computation\n        let mut manual = EdwardsProjective::zero();\n        for (i, \u0026coeff) in coeffs.iter().enumerate() {\n            manual += pc.generators[i] * coeff;\n        }\n\n        // Add blinding\n        let blinding = PolynomialCommitment::generate_blinding_factor(\u0026coeffs);\n        manual += pc.random_point * blinding;\n\n        let c1_proj: EdwardsProjective = c1.0.into();\n        assert_eq!(c1_proj, manual, \"MSM computation should match manual calc\");\n    }\n\n    #[test]\n    fn test_poly_opening_witness_security() {\n        // Test: Witness (proof) cannot be forged untuk different commitment\n        let pc = PolynomialCommitment::new(256);\n\n        let coeffs1 = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(1u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(2u64),\n        ];\n        let poly1 = DensePolynomial::from_coefficients_vec(coeffs1);\n        let _commitment1 = pc.commit(\u0026poly1).expect(\"Commit 1 failed\");\n\n        let point = \u003cEdwardsProjective as Group\u003e::ScalarField::from(5u64);\n        let value1 = poly1.evaluate(\u0026point);\n        let proof1 = pc.open(\u0026poly1, point, value1).expect(\"Open 1 failed\");\n\n        // Use proof1 dengan different commitment\n        let coeffs2 = vec![\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(10u64),\n            \u003cEdwardsProjective as Group\u003e::ScalarField::from(20u64),\n        ];\n        let poly2 = DensePolynomial::from_coefficients_vec(coeffs2);\n        let commitment2 = pc.commit(\u0026poly2).expect(\"Commit 2 failed\");\n\n        // Proof1 should NOT verify proti commitment2\n        let is_
