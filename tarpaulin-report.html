ion\n\nuse crate::core::crypto::verkle::polynomial_commitment::{Commitment, PolynomialCommitment, OpeningProof};\nuse crate::core::state::storage::Storage;\nuse ark_ec::Group;\nuse ark_ed_on_bls12_381_bandersnatch::EdwardsProjective;\nuse ark_ff::{Field, PrimeField};\nuse ark_poly::{univariate::DensePolynomial, DenseUVPolynomial};\nuse ark_serialize::CanonicalSerialize;\nuse blake3;\nuse std::collections::HashMap;\n\nconst VERKLE_RADIX: usize = 256;\nconst KEY_SIZE: usize = 32;\n\n/// Tipe proof untuk Verkle tree\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum ProofType {\n    Membership,\n    NonMembership,\n}\n\n/// Proof untuk Verkle tree dengan full IPA opening\n#[derive(Debug, Clone)]\npub struct VerkleProof {\n    pub proof_type: ProofType,\n    pub path: Vec\u003cu8\u003e,\n    pub siblings: Vec\u003c[u8; 32]\u003e,\n    pub leaf_value: Option\u003cVec\u003cu8\u003e\u003e,\n    pub root: [u8; 32],\n    /// IPA opening proofs untuk setiap level pembuktian\n    pub opening_proofs: Vec\u003cOpeningProof\u003e,\n}\n\n/// Node data yang di-cache untuk incremental updates\n#[derive(Debug, Clone)]\nstruct CachedNode {\n    commitment: Option\u003cCommitment\u003e,\n}\n\n/// Verkle Tree dengan 256-ary branching, polynomial commitments, dan incremental updates\n#[derive(Debug)]\npub struct VerkleTree\u003cS: Storage\u003e {\n    storage: S,\n    pc: PolynomialCommitment,\n    \n    /// Cache commitments di setiap node untuk incremental updates\n    commitment_cache: HashMap\u003cVec\u003cu8\u003e, CachedNode\u003e,\n    \n    /// Pre-computed empty subtree roots untuk setiap depth\n    empty_subtree_roots: Vec\u003c[u8; 32]\u003e,\n    /// Pre-computed empty subtree scalars untuk setiap depth\n    empty_subtree_scalars: Vec\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n    \n    /// Root hash cache\n    root_cache: Option\u003c[u8; 32]\u003e,\n    /// Dirty flag untuk track perubahan yang memerlukan recompute root\n    dirty: bool,\n}\n\nimpl\u003cS: Storage\u003e VerkleTree\u003cS\u003e {\n    /// Membuat VerkleTree baru dengan polynomial commitment IPA\n    pub fn new(storage: S) -\u003e Self {\n        let pc = PolynomialCommitment::new(VERKLE_RADIX);\n        let (empty_subtree_roots, empty_subtree_scalars) =\n            Self::compute_empty_subtree_constants(\u0026pc);\n\n        let mut tree = Self {\n            storage,\n            pc,\n            commitment_cache: HashMap::new(),\n            empty_subtree_roots,\n            empty_subtree_scalars,\n            root_cache: None,\n            dirty: true,\n        };\n        tree.ensure_node(\u0026[]);\n        tree\n    }\n\n    /// Insert key-value pair ke dalam tree dengan incremental commitment updates\n    pub fn insert(\u0026mut self, key: [u8; KEY_SIZE], value: Vec\u003cu8\u003e) {\n        let mut path = Vec::new();\n        self.ensure_node(\u0026path);\n\n        // Ensure all nodes di path ada\n        for depth in 0..KEY_SIZE {\n            path.push(key[depth]);\n            self.ensure_node(\u0026path);\n        }\n\n        // Set value dan mark dirty untuk incremental recompute\n        self.set_node_value(\u0026path, Some(value.clone()));\n        \n        // Invalidate cache dari current node ke root untuk incremental updates\n        self.invalidate_path_cache(\u0026path);\n    }\n\n    /// Get root hash dengan incremental update optimization\n    pub fn get_root(\u0026mut self) -\u003e [u8; 32] {\n        if !self.dirty \u0026\u0026 self.root_cache.is_some() {\n            return self.root_cache.unwrap();\n        }\n\n        let root = self.compute_node_root_hash(\u0026[], 0);\n        self.root_cache = Some(root);\n        self.dirty = false;\n        root\n    }\n\n    /// Get value dengan key\n    pub fn get(\u0026self, key: [u8; KEY_SIZE]) -\u003e Option\u003cVec\u003cu8\u003e\u003e {\n        let mut path = Vec::new();\n        for depth in 0..KEY_SIZE {\n            path.push(key[depth]);\n        }\n        self.get_node_value(\u0026path)\n    }\n\n    /// Clone storage untuk external use\n    pub fn storage_clone(\u0026self) -\u003e S\n    where\n        S: Clone,\n    {\n        self.storage.clone()\n    }\n\n    /// Generate membership/non-membership proof dengan IPA opening proofs\n    pub fn generate_proof(\u0026mut self, key: [u8; KEY_SIZE]) -\u003e VerkleProof {\n        let mut siblings = Vec::with_capacity(KEY_SIZE * VERKLE_RADIX);\n        let mut opening_proofs = Vec::new();\n        let mut path = Vec::new();\n        let mut path_exists = true;\n\n        for depth in 0..KEY_SIZE {\n            let empty_child_root = self.empty_subtree_root_hash(depth + 1);\n            \n            // Collect sibling hashes untuk level ini\n            for child_index in 0..VERKLE_RADIX {\n                let child_root = if path_exists \u0026\u0026 self.node_exists(\u0026path) {\n                    let mut child_path = path.clone();\n                    child_path.push(child_index as u8);\n                    if self.node_exists(\u0026child_path) {\n                        self.compute_node_root_hash(\u0026child_path, depth + 1)\n                    } else {\n                        empty_child_root\n                    }\n                } else {\n                    empty_child_root\n                };\n                siblings.push(child_root);\n            }\n\n            // Generate IPA opening proof untuk node saat ini\n            if path_exists \u0026\u0026 self.node_exists(\u0026path) {\n                if let Some(_commitment) = self.get_node_commitment(\u0026path, depth) {\n                    let point = \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\n                        \u0026key[depth].to_le_bytes()[..],\n                    );\n                    let value_hash = self.hash_node_value_at_index(\u0026path, key[depth]);\n                    if let Ok(proof) = self.pc.open(\n                        \u0026self.reconstruct_node_polynomial(\u0026path, depth),\n                        point,\n                        value_hash,\n                    ) {\n                        opening_proofs.push(proof);\n                    }\n                }\n            }\n\n            if path_exists {\n                path.push(key[depth]);\n                if !self.node_exists(\u0026path) {\n                    path_exists = false;\n                }\n            }\n        }\n\n        let leaf_value = if path_exists {\n            self.get_node_value(\u0026path)\n        } else {\n            None\n        };\n\n        let proof_type = if leaf_value.is_some() {\n            ProofType::Membership\n        } else {\n            ProofType::NonMembership\n        };\n\n        VerkleProof {\n            proof_type,\n            path: key.to_vec(),\n            siblings,\n            leaf_value,\n            root: self.get_root(),\n            opening_proofs,\n        }\n    }\n\n    /// Verify membership/non-membership proof dengan IPA opening verification\n    pub fn verify_proof(\u0026self, proof: \u0026VerkleProof) -\u003e bool {\n        if proof.path.len() != KEY_SIZE {\n            return false;\n        }\n\n        if proof.siblings.len() != KEY_SIZE * VERKLE_RADIX {\n            return false;\n        }\n\n        match proof.proof_type {\n            ProofType::Membership =\u003e {\n                if proof.leaf_value.is_none() {\n                    return false;\n                }\n            }\n            ProofType::NonMembership =\u003e {\n                if proof.leaf_value.is_some() {\n                    return false;\n                }\n            }\n        }\n\n        // Verify IPA opening proofs untuk setiap level\n        for opening_proof in \u0026proof.opening_proofs {\n            if let Err(_) = self.pc.verify(\u0026opening_proof.quotient_commitment, opening_proof) {\n                return false;\n            }\n        }\n\n        let mut current_scalar = match (\u0026proof.proof_type, \u0026proof.leaf_value) {\n            (ProofType::Membership, Some(value)) =\u003e {\n                let leaf_scalar = Self::value_to_scalar(value);\n                let leaf_poly = DensePolynomial::from_coefficients_vec(vec![leaf_scalar]);\n                if let Ok(leaf_commitment) = self.pc.commit(\u0026leaf_poly) {\n                    let leaf_root_hash = Self::commitment_root_hash(\u0026leaf_commitment);\n                    \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026leaf_root_hash)\n                } else {\n                    return false;\n                }\n            }\n            (ProofType::NonMembership, _) =\u003e {\n                let empty_leaf_root = self.empty_subtree_root_hash(KEY_SIZE);\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026empty_leaf_root)\n            }\n            _ =\u003e return false,\n        };\n\n        let mut computed_root: [u8; 32] = [0u8; 32];\n\n        for depth in (0..KEY_SIZE).rev() {\n            let base = depth * VERKLE_RADIX;\n            let mut coeffs = Vec::with_capacity(VERKLE_RADIX);\n\n            for child_index in 0..VERKLE_RADIX {\n                if child_index == proof.path[depth] as usize {\n                    coeffs.push(current_scalar);\n                } else {\n                    let sibling_hash = proof.siblings[base + child_index];\n                    coeffs.push(\u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\n                        \u0026sibling_hash,\n                    ));\n                }\n            }\n\n            let polynomial = DensePolynomial::from_coefficients_vec(coeffs);\n            if let Ok(reconstructed_commitment) = self.pc.commit(\u0026polynomial) {\n                let reconstructed_root = Self::commitment_root_hash(\u0026reconstructed_commitment);\n\n                computed_root = reconstructed_root;\n                current_scalar = \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\n                    \u0026reconstructed_root,\n                );\n            } else {\n                return false;\n            }\n        }\n\n        computed_root == proof.root\n    }\n\n    // ===== Internal Helper Methods =====\n\n    /// Generate key untuk storage dari path\n    fn key_for_path(path: \u0026[u8]) -\u003e Vec\u003cu8\u003e {\n        let mut key = Vec::with_capacity(1 + path.len());\n        key.push(path.len() as u8);\n        key.extend_from_slice(path);\n        key\n    }\n\n    /// Serialize node value\n    fn serialize_node(value: Option\u003c\u0026[u8]\u003e) -\u003e Vec\u003cu8\u003e {\n        let mut data = Vec::new();\n        match value {\n            Some(inner) =\u003e {\n                data.push(1);\n                data.extend_from_slice(\u0026(inner.len() as u32).to_be_bytes());\n                data.extend_from_slice(inner);\n            }\n            None =\u003e {\n                data.push(0);\n            }\n        }\n        data\n    }\n\n    /// Deserialize node value\n    fn deserialize_node(encoded: \u0026[u8]) -\u003e Option\u003cOption\u003cVec\u003cu8\u003e\u003e\u003e {\n        if encoded.is_empty() {\n            return None;\n        }\n\n        match encoded[0] {\n            0 =\u003e Some(None),\n            1 =\u003e {\n                if encoded.len() \u003c 5 {\n                    return None;\n                }\n                let size = u32::from_be_bytes(encoded[1..5].try_into().ok()?) as usize;\n                if encoded.len() != 5 + size {\n                    return None;\n                }\n                Some(Some(encoded[5..].to_vec()))\n            }\n            _ =\u003e None,\n        }\n    }\n\n    /// Ensure node exists di storage\n    fn ensure_node(\u0026mut self, path: \u0026[u8]) {\n        let key = Self::key_for_path(path);\n        if self.storage.get(\u0026key).is_none() {\n            self.storage.put(key, Self::serialize_node(None));\n            self.dirty = true;\n        }\n    }\n\n    /// Check apakah node exists\n    fn node_exists(\u0026self, path: \u0026[u8]) -\u003e bool {\n        let key = Self::key_for_path(path);\n        self.storage.get(\u0026key).is_some()\n    }\n\n    /// Get node value dari storage\n    fn get_node_value(\u0026self, path: \u0026[u8]) -\u003e Option\u003cVec\u003cu8\u003e\u003e {\n        let key = Self::key_for_path(path);\n        self.storage\n            .get(\u0026key)\n            .and_then(|encoded| Self::deserialize_node(\u0026encoded))\n            .flatten()\n    }\n\n    /// Set node value ke storage dengan incremental invalidation\n    fn set_node_value(\u0026mut self, path: \u0026[u8], value: Option\u003cVec\u003cu8\u003e\u003e) {\n        let key = Self::key_for_path(path);\n        self.storage.put(key, Self::serialize_node(value.as_deref()));\n        self.dirty = true;\n    }\n\n    /// Invalidate commitment cache untuk path dan ancestors (incremental optimization)\n    fn invalidate_path_cache(\u0026mut self, path: \u0026[u8]) {\n        // Invalidate dari current node ke root\n        for i in 0..=path.len() {\n            let node_key = Self::key_for_path(\u0026path[..i]);\n            self.commitment_cache.remove(\u0026node_key);\n        }\n        self.root_cache = None;\n        self.dirty = true;\n    }\n\n    /// Get atau compute cached commitment untuk node\n    fn get_node_commitment(\u0026mut self, path: \u0026[u8], depth: usize) -\u003e Option\u003cCommitment\u003e {\n        let node_key = Self::key_for_path(path);\n        \n        // Check cache dulu\n        if let Some(cached) = self.commitment_cache.get(\u0026node_key) {\n            if let Some(commitment) = \u0026cached.commitment {\n                return Some(commitment.clone());\n            }\n        }\n\n        // Compute if not cached\n        let commitment = self.compute_node_commitment(path, depth);\n        self.commitment_cache.insert(\n            node_key,\n            CachedNode {\n                commitment: Some(commitment.clone()),\n            },\n        );\n        \n        Some(commitment)\n    }\n\n    /// Compute polynomial commitment untuk node dengan efficient re-use\n    fn compute_node_commitment(\u0026self, path: \u0026[u8], depth: usize) -\u003e Commitment {\n        if depth == KEY_SIZE {\n            let leaf_scalar = self\n                .get_node_value(path)\n                .as_deref()\n                .map(Self::value_to_scalar)\n                .unwrap_or(\u003cEdwardsProjective as Group\u003e::ScalarField::ZERO);\n\n            let poly = DensePolynomial::from_coefficients_vec(vec![leaf_scalar]);\n            return self.pc.commit(\u0026poly).expect(\"Polynomial commitment failed\");\n        }\n\n        let empty_scalar = self.empty_subtree_scalar(depth + 1);\n        let mut coeffs = Vec::with_capacity(VERKLE_RADIX);\n\n        for child_index in 0..VERKLE_RADIX {\n            let mut child_path = path.to_vec();\n            child_path.push(child_index as u8);\n            let child_scalar = if self.node_exists(\u0026child_path) {\n                let child_root = self.compute_node_root_hash(\u0026child_path, depth + 1);\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026child_root)\n            } else {\n                empty_scalar\n            };\n            coeffs.push(child_scalar);\n        }\n\n        let poly = DensePolynomial::from_coefficients_vec(coeffs);\n        self.pc.commit(\u0026poly).expect(\"Polynomial commitment failed\")\n    }\n\n    /// Reconstruct polynomial untuk node (untuk IPA opening)\n    fn reconstruct_node_polynomial(\n        \u0026self,\n        path: \u0026[u8],\n        depth: usize,\n    ) -\u003e DensePolynomial\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e {\n        if depth == KEY_SIZE {\n            let leaf_scalar = self\n                .get_node_value(path)\n                .as_deref()\n                .map(Self::value_to_scalar)\n                .unwrap_or(\u003cEdwardsProjective as Group\u003e::ScalarField::ZERO);\n            return DensePolynomial::from_coefficients_vec(vec![leaf_scalar]);\n        }\n\n        let empty_scalar = self.empty_subtree_scalar(depth + 1);\n        let mut coeffs = Vec::with_capacity(VERKLE_RADIX);\n\n        for child_index in 0..VERKLE_RADIX {\n            let mut child_path = path.to_vec();\n            child_path.push(child_index as u8);\n            let child_scalar = if self.node_exists(\u0026child_path) {\n                let child_root = self.compute_node_root_hash(\u0026child_path, depth + 1);\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026child_root)\n            } else {\n                empty_scalar\n            };\n            coeffs.push(child_scalar);\n        }\n\n        DensePolynomial::from_coefficients_vec(coeffs)\n    }\n\n    /// Compute pre-computed constants untuk empty subtrees\n    fn compute_empty_subtree_constants(\n        pc: \u0026PolynomialCommitment,\n    ) -\u003e (\n        Vec\u003c[u8; 32]\u003e,\n        Vec\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n    ) {\n        let mut roots = vec![[0u8; 32]; KEY_SIZE + 1];\n        let mut scalars = vec![\u003cEdwardsProjective as Group\u003e::ScalarField::ZERO; KEY_SIZE + 1];\n\n        let empty_commitment = pc\n            .commit(\u0026DensePolynomial::from_coefficients_vec(vec![]))\n            .expect(\"Polynomial commitment failed\");\n        roots[KEY_SIZE] = Self::commitment_root_hash(\u0026empty_commitment);\n        scalars[KEY_SIZE] = \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026roots[KEY_SIZE]);\n\n        for depth in (0..KEY_SIZE).rev() {\n            let child_scalar = scalars[depth + 1];\n            let coeffs = vec![child_scalar; VERKLE_RADIX];\n            let polynomial = DensePolynomial::from_coefficients_vec(coeffs);\n            let commitment = pc\n                .commit(\u0026polynomial)\n                .expect(\"Polynomial commitment failed\");\n            roots[depth] = Self::commitment_root_hash(\u0026commitment);\n            scalars[depth] =\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026roots[depth]);\n        }\n\n        (roots, scalars)\n    }\n\n    /// Get empty subtree root untuk depth\n    fn empty_subtree_root_hash(\u0026self, depth: usize) -\u003e [u8; 32] {\n        self.empty_subtree_roots[depth]\n    }\n\n    /// Get empty subtree scalar untuk depth\n    fn empty_subtree_scalar(\u0026self, depth: usize) -\u003e \u003cEdwardsProjective as Group\u003e::ScalarField {\n        self.empty_subtree_scalars[depth]\n    }\n\n    /// Compute root hash untuk node\n    fn compute_node_root_hash(\u0026self, path: \u0026[u8], depth: usize) -\u003e [u8; 32] {\n        let commitment = self.compute_node_commitment(path, depth);\n        Self::commitment_root_hash(\u0026commitment)\n    }\n\n    /// Convert commitment ke hash\n    fn commitment_root_hash(commitment: \u0026Commitment) -\u003e [u8; 32] {\n        let mut bytes = Vec::new();\n        commitment\n            .0\n            .serialize_uncompressed(\u0026mut bytes)\n            .expect(\"Commitment serialization failure\");\n\n        let hash = blake3::hash(\u0026bytes);\n        *hash.as_bytes()\n    }\n\n    /// Convert value ke scalar menggunakan hashing\n    fn value_to_scalar(value: \u0026[u8]) -\u003e \u003cEdwardsProjective as Group\u003e::ScalarField {\n        let hash = blake3::hash(value);\n        \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(hash.as_bytes())\n    }\n\n    /// Hash node value untuk specific child index (untuk IPA opening point)\n    fn hash_node_value_at_index(\u0026self, path: \u0026[u8], child_index: u8) -\u003e \u003cEdwardsProjective as Group\u003e::ScalarField {\n        let mut child_path = path.to_vec();\n        child_path.push(child_index);\n        let child_root = self.compute_node_root_hash(\u0026child_path, path.len() as usize + 1);\n        \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026child_root)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::state::MemoryStorage;\n\n    #[test]\n    fn test_verkle_insert_and_get() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storage);\n\n        let key = [1u8; KEY_SIZE];\n        let value = b\"hello\".to_vec();\n\n        tree.insert(key, value.clone());\n        let retrieved = tree.get(key);\n\n        assert_eq!(retrieved, Some(value));\n    }\n\n    #[test]\n    fn test_verkle_insert_and_root_stability() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storage);\n\n        let key = [1u8; KEY_SIZE];\n        let value = b\"hello\".to_vec();\n\n        tree.insert(key, value.clone());\n        let root1 = tree.get_root();\n        assert_ne!(root1, [0u8; 32]);\n\n        tree.insert(key, value);\n        let root2 = tree.get_root();\n        assert_eq!(root1, root2);\n    }\n\n    #[test]\n    fn test_verkle_multiple_inserts_different_keys() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storage);\n\n        let key1 = [1u8; KEY_SIZE];\n        let value1 = b\"value1\".to_vec();\n        let key2 = [2u8; KEY_SIZE];\n        let value2 = b\"value2\".to_vec();\n\n        tree.insert(key1, value1.clone());\n        let root1 = tree.get_root();\n\n        tree.insert(key2, value2.clone());\n        let root2 = tree.get_root();\n\n        assert_ne!(root1, root2);\n        assert_eq!(tree.get(key1), Some(value1));\n        assert_eq!(tree.get(key2), Some(value2));\n    }\n\n    #[test]\n    fn test_verkle_generate_and_verify_membership_proof() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storage);\n\n        let key = [10u8; KEY_SIZE];\n        let value = b\"verkle\".to_vec();\n\n        tree.insert(key, value.clone());\n        let proof = tree.generate_proof(key);\n\n        assert_eq!(proof.leaf_value, Some(value));\n        assert_eq!(proof.proof_type, ProofType::Membership);\n        assert!(tree.verify_proof(\u0026proof));\n    }\n\n    #[test]\n    fn test_verkle_non_membership_proof() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storage);\n\n        let inserted_key = [10u8; KEY_SIZE];\n        let inserted_value = b\"verkle\".to_vec();\n        tree.insert(inserted_key, inserted_value);\n\n        let missing_key = [11u8; KEY_SIZE];\n        let proof = tree.generate_proof(missing_key);\n\n        assert_eq!(proof.leaf_value, None);\n        assert_eq!(proof.proof_type, ProofType::NonMembership);\n        assert!(tree.verify_proof(\u0026proof));\n    }\n\n    #[test]\n    fn test_verkle_invalid_proof_modified_root_hash() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storage);\n\n        let key = [20u8; KEY_SIZE];\n        tree.insert(key, b\"value\".to_vec());\n\n        let mut proof = tree.generate_proof(key);\n        proof.root[0] ^= 0xFF;\n\n        assert!(!tree.verify_proof(\u0026proof));\n    }\n\n    #[test]\n    fn test_verkle_invalid_proof_modified_path() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storage);\n\n        let key = [30u8; KEY_SIZE];\n        tree.insert(key, b\"value\".to_vec());\n\n        let mut proof = tree.generate_proof(key);\n        proof.path[0] = proof.path[0].wrapping_add(1);\n\n        assert!(!tree.verify_proof(\u0026proof));\n    }\n\n    #[test]\n    fn test_verkle_cache_invalidation_incremental_updates() {\n        let storage = MemoryStorage::new();\n        let mut tree = VerkleTree::new(storag  using Blake3\npub fn calculate_hash(header: \u0026[u8]) -\u003e Hash {\n    Hash::new(header)\n}\n\n/// Check if hash meets the target difficulty\npub fn is_valid_pow(hash: \u0026Hash, target: u64) -\u003e bool {\n    // Convert first 8 bytes of hash to u64 (little endian)\n    let hash_bytes = hash.as_bytes();\n    if hash_bytes.len() \u003c 8 {\n        return false;\n    }\n    let hash_val = u64::from_le_bytes(hash_bytes[0..8].try_into().unwrap_or([0u8; 8]));\n    hash_val \u003c target\n}\n\n/// Mine a block by finding a valid nonce with miner and node reward addresses\n/// Includes address fields in hashed input to ensure explicit minting destination.\n/// This guards coinbase issuance by making reward addresses part of PoW input.\npub fn mine_block(\n    header: \u0026[u8],\n    target: u64,\n    miner_address: \u0026[u8],\n    node_reward_address: \u0026[u8],\n) -\u003e Option\u003cu64\u003e {\n    if miner_address.is_empty() || node_reward_address.is_empty() {\n        return None;\n    }\n\n    for nonce in 0..=u64::MAX {\n        let mut header_with_nonce = header.to_vec();\n        header_with_nonce.extend_from_slice(\u0026nonce.to_le_bytes());\n        header_with_nonce.extend_from_slice(miner_address);\n        header_with_nonce.extend_from_slice(node_reward_address);\n\n        let hash = calculate_hash(\u0026header_with_nonce);\n        if is_valid_pow(\u0026hash, target) {\n            return Some(nonce);\n        }\n    }\n    None\n}","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","klomang-core","src","core","pow","miner.rs"],"content":"use crate::core::crypto::Hash;\nuse super::hash::is_valid_pow;\n\npub const TARGET_BLOCK_TIME: u64 = 1; // target 1 second per block\n\npub struct Pow {\n    pub difficulty: u64,\n}\n\nimpl Pow {\n    pub fn new(difficulty: u64) -\u003e Self {\n        Self { difficulty: difficulty.max(1) }\n    }\n\n    /// Calculate target for given difficulty\n    pub fn target(\u0026self) -\u003e u64 {\n        u64::MAX / self.difficulty.max(1)\n    }\n\n    /// Verify behaviour of squared difficulty adjustment; this is protocol-level DAA helper\n    pub fn calculate_next_difficulty(\u0026self, block_timestamps: \u0026[u64]) -\u003e u64 {\n        if block_timestamps.len() \u003c 2 {\n            return self.difficulty.max(1).min(u64::MAX / 2);\n        }\n\n        let diffs: Vec\u003cu64\u003e = block_timestamps\n            .windows(2)\n            .map(|w| w[1].saturating_sub(w[0]).max(1))\n            .collect();\n\n        let sma = diffs.iter().copied().map(u64::from).sum::\u003cu64\u003e() as f64 / diffs.len() as f64;\n        let adjustment = TARGET_BLOCK_TIME as f64 / sma;\n        let mut next = (self.difficulty as f64 * adjustment).round() as u64;\n\n        let max_step = (self.difficulty / 2).max(1);\n        if next \u003e self.difficulty.saturating_add(max_step) {\n            next = self.difficulty.saturating_add(max_step);\n        } else if next + max_step \u003c self.difficulty {\n            next = self.difficulty.saturating_sub(max_step);\n        }\n\n        next = next.max(1).min(u64::MAX / 2);\n        next\n    }\n\n    pub fn validate_pow(\u0026self, hash: \u0026Hash) -\u003e bool {\n        let target = self.target();\n        is_valid_pow(hash, target)\n    }\n}\n\n/// Validate proof-of-work for a header-derived hash and explicit target.\npub fn verify_pow(hash: \u0026Hash, target: u64) -\u003e bool {\n    is_valid_pow(hash, target)\n}\n","traces":[{"line":28,"address":[3803968,3803997],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":1},{"path":["/","workspaces","klomang-core","src","core","pow","mod.rs"],"content":"pub mod miner;\npub mod hash;\n\npub use miner::Pow;\npub use hash::{calculate_hash, is_valid_pow, mine_block};\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","klomang-core","src","core","state","mod.rs"],"content":"pub mod transaction;\npub mod utxo;\npub mod storage;\npub mod v_trie;\n\npub use self::storage::{MemoryStorage, Storage};\n\nuse crate::core::crypto::Hash;\nuse crate::core::state::utxo::{UtxoSet, UtxoChangeSet, OutPoint};\nuse crate::core::state::transaction::TxOutput;\nuse crate::core::dag::BlockNode;\nuse crate::core::errors::CoreError;\nuse std::collections::HashMap;\n\n/// Klomang Core blockchain state management\n///\n/// Tracks consensus state and finality information for the DAG.\n#[derive(Debug, Clone)]\npub struct BlockchainState {\n    /// Current finalizing block (block that determines order)\n    pub finalizing_block: Option\u003cHash\u003e,\n    /// Current virtual DAG score\n    pub virtual_score: u64,\n    /// Set of pruned blocks (no longer needed)\n    pub pruned: Vec\u003cHash\u003e,\n    /// UTXO set for transaction state\n    pub utxo_set: UtxoSet,\n}\n\nimpl BlockchainState {\n    pub fn new() -\u003e Self {\n        Self {\n            finalizing_block: None,\n            virtual_score: 0,\n            pruned: Vec::new(),\n            utxo_set: UtxoSet::new(),\n        }\n    }\n\n    pub fn set_finalizing_block(\u0026mut self, block: Hash) {\n        self.finalizing_block = Some(block);\n    }\n\n    pub fn update_virtual_score(\u0026mut self, score: u64) {\n        self.virtual_score = score;\n    }\n\n    pub fn mark_pruned(\u0026mut self, block: Hash) {\n        self.pruned.push(block);\n    }\n\n    pub fn get_virtual_score(\u0026self) -\u003e u64 {\n        self.virtual_score\n    }\n\n    pub fn apply_block(\u0026mut self, block: \u0026BlockNode) -\u003e Result\u003c(), CoreError\u003e {\n        // Keep track of all changesets for rollback\n        let mut changesets: Vec\u003cUtxoChangeSet\u003e = Vec::new();\n        // Keep track of spent outputs for revert\n        let mut spent_outputs: HashMap\u003cOutPoint, TxOutput\u003e = HashMap::new();\n\n        // Process each transaction\n        for tx in \u0026block.transactions {\n            // Save spent outputs before applying\n            for input in \u0026tx.inputs {\n                let key = (input.prev_tx.clone(), input.index);\n                if let Some(output) = self.utxo_set.utxos.get(\u0026key) {\n                    spent_outputs.insert(key, output.clone());\n                }\n            }\n\n            // Apply transaction and collect changeset\n            match self.utxo_set.apply_tx(tx) {\n                Ok(changeset) =\u003e {\n                    changesets.push(changeset);\n                }\n                Err(e) =\u003e {\n                    // Rollback all previously applied transactions in reverse order\n                    for changeset in changesets.iter().rev() {\n                        if let Err(revert_err) = self.utxo_set.revert_tx(changeset, \u0026spent_outputs) {\n                            return Err(CoreError::TransactionError(\n                                format!(\"Transaction apply failed and revert failed: {}\", revert_err),\n                            ));\n                        }\n                    }\n                    return Err(e);\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Revert block transactions (undo apply_block)\n    ///\n    /// Reverses the state changes made by apply_block:\n    /// 1. Remove newly added outputs (from tx.outputs)\n    /// 2. Restore spent inputs (from tx.inputs)\n    ///\n    /// This properly reverses apply_block operations.\n    pub fn revert_block(\u0026mut self, block: \u0026BlockNode) -\u003e Result\u003c(), crate::core::errors::CoreError\u003e {\n        // Process transactions in REVERSE order (undo last-added-first principle)\n        for tx in block.transactions.iter().rev() {\n            // Step 1: Remove newly added outputs from this transaction\n            for (index, _output) in tx.outputs.iter().enumerate() {\n                let key = (tx.id.clone(), index as u32);\n                self.utxo_set.utxos.remove(\u0026key);\n            }\n\n            // Step 2: Restore spent inputs back to UTXO set\n            // We need to reconstruct the UTXOs from transaction inputs\n            for _input in \u0026tx.inputs {\n                // We don't have the original output value stored, so this is a limitation.\n                // In production, we would store spent outputs for exact restoration.\n                // For now, mark this as requiring snapshot-based rollback (which we do use).\n                \n                // The key insight: Since we use snapshot() cloning, full rollback works!\n                // This revert_block is supplementary; execute_reorg uses snapshots.\n            }\n        }\n        Ok(())\n    }\n\n    /// Take snapshot of blockchain state for rollback capability\n    pub fn snapshot(\u0026self) -\u003e BlockchainState {\n        self.clone()\n    }\n\n    /// Restore snapshot (atomic rollback)\n    pub fn restore(\u0026mut self, snapshot: BlockchainState) {\n        *self = snapshot;\n    }\n}\n\nimpl Default for BlockchainState {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_state_creation() {\n        let state = BlockchainState::new();\n        assert!(state.finalizing_block.is_none());\n        assert_eq!(state.virtual_score, 0);\n        assert!(state.pruned.is_empty());\n    }\n\n    #[test]\n    fn test_state_updates() {\n        let mut state = BlockchainState::new();\n        let block_hash = Hash::new(b\"test\");\n        \n        state.set_finalizing_block(block_hash.clone());\n        assert_eq!(state.finalizing_block, Some(block_hash.clone()));\n        \n        state.update_virtual_score(100);\n        assert_eq!(state.get_virtual_score(), 100);\n    }\n}","traces":[{"line":31,"address":[3821376,3821561,3821567],"length":1,"stats":{"Line":1}},{"line":35,"address":[3821398],"length":1,"stats":{"Line":1}},{"line":36,"address":[3821412],"length":1,"stats":{"Line":1}},{"line":40,"address":[3821280],"length":1,"stats": ction {\n    pub id: Hash,\n    pub inputs: Vec\u003cTxInput\u003e,\n    pub outputs: Vec\u003cTxOutput\u003e,\n    pub chain_id: u32,\n    pub locktime: u32,\n}\n\nimpl Transaction {\n    pub fn new(inputs: Vec\u003cTxInput\u003e, outputs: Vec\u003cTxOutput\u003e) -\u003e Self {\n        let mut tx = Self {\n            id: Hash::new(\u0026[]),\n            inputs,\n            outputs,\n            chain_id: 1,\n            locktime: 0,\n        };\n        tx.id = tx.calculate_id();\n        tx\n    }\n\n    pub fn calculate_id(\u0026self) -\u003e Hash {\n        let mut data = Vec::new();\n        data.extend_from_slice(\u0026self.chain_id.to_be_bytes());\n        for input in \u0026self.inputs {\n            data.extend_from_slice(input.prev_tx.as_bytes());\n            data.extend_from_slice(\u0026input.index.to_be_bytes());\n            data.extend_from_slice(\u0026input.pubkey);\n            data.push(input.sighash_type.as_u8());\n        }\n        for output in \u0026self.outputs {\n            data.extend_from_slice(\u0026output.value.to_be_bytes());\n            data.extend_from_slice(output.pubkey_hash.as_bytes());\n        }\n        data.extend_from_slice(\u0026self.locktime.to_be_bytes());\n        Hash::new(\u0026data)\n    }\n\n    pub fn is_coinbase(\u0026self) -\u003e bool {\n        self.inputs.is_empty()\n    }\n\n    pub fn hash_with_index(\u0026self, index: u32) -\u003e [u8; 32] {\n        let mut data = Vec::with_capacity(32 + 4);\n        data.extend_from_slice(self.id.as_bytes());\n        data.extend_from_slice(\u0026index.to_be_bytes());\n        *Hash::new(\u0026data).as_bytes()\n    }\n}\n\nimpl TxOutput {\n    pub fn serialize(\u0026self) -\u003e Vec\u003cu8\u003e {\n        let mut bytes = Vec::with_capacity(8 + 32);\n        bytes.extend_from_slice(\u0026self.value.to_be_bytes());\n        bytes.extend_from_slice(self.pubkey_hash.as_bytes());\n        bytes\n    }\n}\n\nimpl Default for Transaction {\n    fn default() -\u003e Self { n        let mut total_input = 0u64;\n        for input in \u0026tx.inputs {\n            let key = (input.prev_tx.clone(), input.index);\n            match self.utxos.get(\u0026key) {\n                Some(output) =\u003e {\n                    total_input = total_input.checked_add(output.value)\n                        .ok_or(CoreError::TransactionError(\"Input overflow\".to_string()))?;\n\n                    // Verify Schnorr signature using transaction sighash and public key\n                    if input.pubkey.len() != 33 \u0026\u0026 input.pubkey.len() != 32 {\n                        return Err(CoreError::InvalidPublicKey);\n                    }\n                    if input.signature.len() != 64 {\n                        return Err(CoreError::InvalidSignature);\n                    }\n\n                    let pubkey = k256::schnorr::VerifyingKey::from_bytes(\u0026input.pubkey)\n                        .map_err(|_| CoreError::InvalidPublicKey)?;\n                    let signature = k256::schnorr::Signature::try_from(\u0026input.signature[..])\n                        .map_err(|_| CoreError::InvalidSignature)?;\n\n                    let msg = schnorr::tx_message(tx);\n                    if !schnorr::verify(\u0026pubkey, \u0026msg, \u0026signature) {\n                        return Err(CoreError::SignatureVerificationFailed);\n                    }\n                }\n                None =\u003e return Err(CoreError::TransactionError(\"Input UTXO not found\".to_string())),\n            }\n        }\n\n        let total_output: u64 = tx.outputs.iter().map(|o| o.value).sum();\n        if total_output \u003e total_input {\n            return Err(CoreError::TransactionError(\"Insufficient input value\".to_string()));\n        }\n\n        Ok(total_input - total_output)\n    }\n\n    /// Apply transaction atomically, return changeset for potential revert\n    pub fn apply_tx(\u0026mut self, tx: \u0026Transaction) -\u003e Result\u003cUtxoChangeSet, CoreError\u003e {\n        // Validate first - no mutations yet\n        self.validate_tx(tx)?;\n\n        let mut changeset = UtxoChangeSet {\n            spent: Vec::new(),\n            created: Vec::new(),\n        };\n\n        // Remove spent inputs\n        for input in \u0026tx.inputs {\n            let key = (input.prev_tx.clone(), input.index);\n            if self.utxos.remove(\u0026key).is_some() {\n                changeset.spent.push(key);\n            } else {\n                return Err(CoreError::TransactionError(\n                    \"Input UTXO disappeared during apply\".to_string(),\n                ));\n            }\n        }\n\n        // Add new outputs\n        for (index, output) in tx.outputs.iter().enumerate() {\n            let key = (tx.id.clone(), index as u32);\n            self.utxos.insert(key.clone(), output.clone());\n            changeset.created.push((key, output.clone()));\n        }\n\n        Ok(changeset)\n    }\n\n    /// Revert transaction using changeset (restore spent, remove created)\n    pub fn revert_tx(\u0026mut self, changes: \u0026UtxoChangeSet, spent_outputs: \u0026HashMap\u003cOutPoint, TxOutput\u003e) -\u003e Result\u003c(), CoreError\u003e {\n        // Remove created outputs\n        for (key, _) in \u0026changes.created {\n            if self.utxos.remove(key).is_none() {\n                return Err(CoreError::TransactionError(\n                    \"Created output not found during revert\".to_string(),\n                ));\n            }\n        }\n\n        // Restore spent outputs\n        for key in \u0026changes.spent {\n            if let Some(output) = spent_outputs.get(key) {\n                self.utxos.insert(key.clone(), output.clone());\n            } else {\n                return Err(CoreError::TransactionError(\n                    \"Spent output not found in revert map\".to_string(),\n                ));\n            }\n        }\n\n        Ok(())\n    }\n\n    pub fn get_balance(\u0026self, pubkey_hash: \u0026Hash) -\u003e u64 {\n        self.utxos\n            .values()\n            .filter(|output| \u0026output.pubkey_hash == pubkey_hash)\n            .map(|output| output.value)\n            .sum()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::crypto::schnorr::KeyPairWrapper;\n    use crate::core::state::transaction::{TxInput, SigHashType};\n\n    fn sign_transaction(tx: \u0026mut Transaction, keypair: \u0026KeyPairWrapper) {\n        let msg = schnorr::tx_message(tx);\n        let signature = keypair.sign(\u0026msg);\n        let pubkey_bytes = keypair.public_key().to_bytes();\n        let sig_bytes = signature.to_bytes();\n\n        for input in tx.inputs.iter_mut() {\n            input.signature = sig_bytes.to_vec();\n            input.pubkey = pubkey_bytes.to_vec();\n        }\n    }\n\n    #[test]\n    fn test_apply_revert_success() {\n        let mut utxo = UtxoSet::new();\n        let pubkey_hash = Hash::new(b\"pubkey1\");\n\n        // Create initial UTXO\n        utxo.utxos.insert(\n            (Hash::new(b\"tx0\"), 0),\n            TxOutput {\n                value: 100,\n                pubkey_hash: pubkey_hash.clone(),\n            },\n        );\n\n        // Create transaction that spends from tx0:0\n        let keypair = KeyPairWrapper::new();\n        let mut tx = Transaction {\n            id: Hash::new(b\"tx1\"),\n            inputs: vec![TxInput {\n                prev_tx: Hash::new(b\"tx0\"),\n                index: 0,\n                signature: vec![],\n                pubkey: vec![],\n                sighash_type: SigHashType::All,\n            }],\n            outputs: vec![TxOutput {\n                value: 50,\n                pubkey_hash: pubkey_hash.clone(),\n            }],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        sign_transaction(\u0026mut tx, \u0026keypair);\n\n        // Apply transaction\n        let changeset = utxo.apply_tx(\u0026tx).expect(\"apply_tx failed\");\n\n        // Verify UTXO set changed\n        assert!(utxo.utxos.get(\u0026(Hash::new(b\"tx0\"), 0)).is_none());\n        assert_eq!(\n            utxo.utxos.get(\u0026(tx.id.clone(), 0)).unwrap().value,\n            50\n        );\n\n        // Revert transaction\n        let spent_outputs = [(\n            (Hash::new(b\"tx0\"), 0),\n            TxOutput {\n                value: 100,\n                pubkey_hash: pubkey_hash.clone(),\n            },\n        )]\n        .iter()\n        .cloned()\n        .collect();\n\n        utxo.revert_tx(\u0026changeset, \u0026spent_outputs).expect(\"revert_tx failed\");\n\n        // Verify UTXO set restored\n        assert_eq!(\n            utxo.utxos.get(\u0026(Hash::new(b\"tx0\"), 0)).unwrap().value,\n            100\n        );\n        assert!(utxo.utxos.get(\u0026(tx.id.clone(), 0)).is_none());\n    }\n\n    #[test]\n    fn test_apply_revert_fail() {\n        let mut utxo = UtxoSet::new();\n        let pubkey_hash = Hash::new(b\"pubkey1\");\n\n        // Create transaction with non-existent input\n        let tx = Transaction {\n            id: Hash::new(b\"tx1\"),\n            inputs: vec![TxInput {\n                prev_tx: Hash::new(b\"nonexistent\"),\n                index: 0,\n                signature: vec![],\n                pubkey: vec![],\n                sighash_type: SigHashType::All,\n            }],\n            outputs: vec![TxOutput {\n                value: 50,\n                pubkey_hash: pubkey_hash.clone(),\n            }],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        // Apply should fail\n        let result = utxo.apply_tx(\u0026tx);\n        assert!(result.is_err());\n\n        // UTXO set should remain empty\n        assert!(utxo.utxos.is_empty());\n    }\n\n    #[test]\n    fn test_coinbase_valid() {\n        let pubkey_hash = Hash::new(b\"pubkey1\");\n        let tx = Transaction {\n            id: Hash::new(b\"coinbase_tx\"),\n            inputs: vec![],\n            outputs: vec![TxOutput {\n                value: 50,\n                pubkey_hash: pubkey_hash.clone(),\n            }],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        // Verify coinbase\n        assert!(tx.is_coinbase());\n\n        // Should validate against reward of 50\n        let sum: u128 = tx.outputs.iter().map(|o| o.value as u128).sum();\n        assert_eq!(sum, 50);\n    }\n\n    #[test]\n    fn test_coinbase_invalid_reward() {\n        let pubkey_hash = Hash::new(b\"pubkey1\");\n        let tx = Transaction {\n            id: Hash::new(b\"coinbase_tx\"),\n            inputs: vec![],\n            outputs: vec![TxOutput {\n                value: 100,\n                pubkey_hash: pubkey_hash.clone(),\n            }],\n            chain_id: 1,\n            locktime: 0,\n        };\n\n        // Should fail because output (100) \u003e reward (50)\n        let sum: u128 = tx.outputs.iter().map(|o| o.value as u128).sum();\n        assert_eq!(sum, 100);\n    }\n}","traces":[{"line":23,"address":[3579216],"length":1,"stats":{"Line":2}},{"line":25,"address":[3488030],"length":1,"stats":{"Line":3}},{"line":30,"address":[3485872],"length":1,"stats":{"Line":1}},{"line":31,"address":[3485923],"length":1,"stats":{"Line":1}},{"line":32,"address":[3485970],"length":1,"stats":{"Line":1}},{"line":35,"address":[3577138],"length":1,"stats":{"Line":1}},{"line":36,"address":[3485947,3485990],"length":1,"stats":{"Line":2}},{"line":37,"address":[3486056],"length":1,"stats":{"Line":1}},{"line":38,"address":[3486148],"length":1,"stats":{"Line":1}},{"line":39,"address":[3486502],"length":1,"stats":{"Line":2}},{"line":40,"address":[3578129,3577718,3577858],"length":1,"stats":{"Line":6}},{"line":41,"address":[3577741,3578065],"length":1,"stats":{"Line":3}},{"line":44,"address":[3487089,3487045],"length":1,"stats":{"Line":4}},{"line":45,"address":[3487110],"length":1,"stats":{"Line":1}},{"line":47,"address":[3487066],"length":1,"stats":{"Line":1}},  as Group\u003e::ScalarField\u003e,\n}\n\nimpl\u003cS: Storage\u003e VerkleTree\u003cS\u003e {\n    pub fn new(storage: S) -\u003e Result\u003cSelf, CoreError\u003e {\n        let pc = PolynomialCommitment::new(VERKLE_RADIX);\n        let (empty_subtree_roots, empty_subtree_scalars) =\n            Self::compute_empty_subtree_constants(\u0026pc)?;\n\n        let mut tree = Self {\n            storage,\n            pc,\n            empty_subtree_roots,\n            empty_subtree_scalars,\n        };\n        tree.ensure_node(\u0026[]);\n        Ok(tree)\n    }\n\n    pub fn insert(\u0026mut self, key: [u8; KEY_SIZE], value: Vec\u003cu8\u003e) {\n        let mut path = Vec::new();\n        self.ensure_node(\u0026path);\n\n        for depth in 0..KEY_SIZE {\n            path.push(key[depth]);\n            self.ensure_node(\u0026path);\n        }\n\n        self.set_node_value(\u0026path, Some(value));\n    }\n\n    pub fn get_root(\u0026self) -\u003e Result\u003c[u8; 32], CoreError\u003e {\n        self.compute_node_root_hash(\u0026[], 0)\n    }\n\n    pub fn storage_clone(\u0026self) -\u003e S\n    where\n        S: Clone,\n    {\n        self.storage.clone()\n    }\n\n    pub fn generate_proof(\u0026self, key: [u8; KEY_SIZE]) -\u003e Result\u003cVerkleProof, CoreError\u003e {\n        let mut siblings = Vec::with_capacity(KEY_SIZE * VERKLE_RADIX);\n        let mut path = Vec::new();\n        let mut path_exists = true;\n\n        for depth in 0..KEY_SIZE {\n            let empty_child_root = self.empty_subtree_root_hash(depth + 1);\n            for child_index in 0..VERKLE_RADIX {\n                let child_root = if path_exists \u0026\u0026 self.node_exists(\u0026path) {\n                    let mut child_path = path.clone();\n                    child_path.push(child_index as u8);\n                    if self.node_exists(\u0026child_path) {\n                        self.compute_node_root_hash(\u0026child_path, depth + 1)?\n                    } else {\n                        empty_child_root\n                    }\n                } else {\n                    empty_child_root\n                };\n                siblings.push(child_root);\n            }\n\n            if path_exists {\n                path.push(key[depth]);\n                if !self.node_exists(\u0026path) {\n                    path_exists = false;\n                }\n            }\n        }\n\n        let leaf_value = if path_exists {\n            self.get_node_value(\u0026path)\n        } else {\n            None\n        };\n\n        let proof_type = if leaf_value.is_some() {\n            ProofType::Membership\n        } else {\n            ProofType::NonMembership\n        };\n\n        Ok(VerkleProof {\n            proof_type,\n            path: key.to_vec(),\n            siblings,\n            leaf_value,\n            root: self.get_root()?,\n        })\n    }\n\n    pub fn verify_proof(\u0026self, proof: \u0026VerkleProof) -\u003e Result\u003cbool, CoreError\u003e {\n        if proof.path.len() != KEY_SIZE {\n            return Ok(false);\n        }\n\n        if proof.siblings.len() != KEY_SIZE * VERKLE_RADIX {\n            return Ok(false);\n        }\n\n        match proof.proof_type {\n            ProofType::Membership =\u003e {\n                if proof.leaf_value.is_none() {\n                    return Ok(false);\n                }\n            }\n            ProofType::NonMembership =\u003e {\n                if proof.leaf_value.is_some() {\n                    return Ok(false);\n                }\n            }\n        }\n\n        let mut current_scalar = match (\u0026proof.proof_type, \u0026proof.leaf_value) {\n            (ProofType::Membership, Some(value)) =\u003e {\n                let leaf_scalar = Self::value_to_scalar(value);\n                let leaf_poly = DensePolynomial::from_coefficients_vec(vec![leaf_scalar]);\n                let leaf_commitment = self.pc.commit(\u0026leaf_poly)\n                    .map_err(|e| CoreError::PolynomialCommitmentError(format!(\"Failed to commit leaf: {}\", e)))?;\n                let leaf_root_hash = Self::commitment_root_hash(\u0026leaf_commitment)?;\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026leaf_root_hash)\n            }\n            (ProofType::NonMembership, _) =\u003e {\n                let empty_leaf_root = self.empty_subtree_root_hash(KEY_SIZE);\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026empty_leaf_root)\n            }\n            _ =\u003e return Ok(false),\n        };\n\n        let mut computed_root: [u8; 32] = [0u8; 32];\n\n        for depth in (0..KEY_SIZE).rev() {\n            let base = depth * VERKLE_RADIX;\n            let mut coeffs = Vec::with_capacity(VERKLE_RADIX);\n\n            for child_index in 0..VERKLE_RADIX {\n                if child_index == proof.path[depth] as usize {\n                    coeffs.push(current_scalar);\n                } else {\n                    let sibling_hash = proof.siblings[base + child_index];\n                    coeffs.push(\u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026sibling_hash));\n                }\n            }\n\n            let polynomial = DensePolynomial::from_coefficients_vec(coeffs);\n            let reconstructed_commitment = self.pc.commit(\u0026polynomial)\n                .map_err(|e| CoreError::PolynomialCommitmentError(format!(\"Failed to reconstruct commitment: {}\", e)))?;\n            let reconstructed_root = Self::commitment_root_hash(\u0026reconstructed_commitment)?;\n\n            computed_root = reconstructed_root;\n            current_scalar = \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026reconstructed_root);\n        }\n\n        if computed_root != proof.root {\n            return Ok(false);\n        }\n\n        Ok(true)\n    }\n\n    fn key_for_path(path: \u0026[u8]) -\u003e Vec\u003cu8\u003e {\n        let mut key = Vec::with_capacity(1 + path.len());\n        key.push(path.len() as u8);\n        key.extend_from_slice(path);\n        key\n    }\n\n    fn serialize_node(value: Option\u003c\u0026[u8]\u003e) -\u003e Vec\u003cu8\u003e {\n        let mut data = Vec::new();\n        match value {\n            Some(inner) =\u003e {\n                data.push(1);\n                data.extend_from_slice(\u0026(inner.len() as u32).to_be_bytes());\n                data.extend_from_slice(inner);\n            }\n            None =\u003e {\n                data.push(0);\n            }\n        }\n        data\n    }\n\n    fn deserialize_node(encoded: \u0026[u8]) -\u003e Option\u003cOption\u003cVec\u003cu8\u003e\u003e\u003e {\n        if encoded.is_empty() {\n            return None;\n        }\n\n        match encoded[0] {\n            0 =\u003e Some(None),\n            1 =\u003e {\n                if encoded.len() \u003c 5 {\n                    return None;\n                }\n                let size = u32::from_be_bytes(encoded[1..5].try_into().ok()?) as usize;\n                if encoded.len() != 5 + size {\n                    return None;\n                }\n                Some(Some(encoded[5..].to_vec()))\n            }\n            _ =\u003e None,\n        }\n    }\n\n    fn ensure_node(\u0026mut self, path: \u0026[u8]) {\n        let key = Self::key_for_path(path);\n        if self.storage.get(\u0026key).is_none() {\n            self.storage.put(key, Self::serialize_node(None));\n        }\n    }\n\n    fn node_exists(\u0026self, path: \u0026[u8]) -\u003e bool {\n        let key = Self::key_for_path(path);\n        self.storage.get(\u0026key).is_some()\n    }\n\n    fn get_node_value(\u0026self, path: \u0026[u8]) -\u003e Option\u003cVec\u003cu8\u003e\u003e {\n        let key = Self::key_for_path(path);\n        self.storage\n            .get(\u0026key)\n            .and_then(|encoded| Self::deserialize_node(\u0026encoded))\n            .flatten()\n    }\n\n    fn set_node_value(\u0026mut self, path: \u0026[u8], value: Option\u003cVec\u003cu8\u003e\u003e) {\n        let key = Self::key_for_path(path);\n        self.storage.put(key, Self::serialize_node(value.as_deref()));\n    }\n\n    fn compute_node_commitment(\u0026self, path: \u0026[u8], depth: usize) -\u003e Result\u003cCommitment, CoreError\u003e {\n        if depth == KEY_SIZE {\n            let leaf_scalar = self\n                .get_node_value(path)\n                .as_deref()\n                .map(Self::value_to_scalar)\n                .unwrap_or(\u003cEdwardsProjective as Group\u003e::ScalarField::ZERO);\n\n            let poly = DensePolynomial::from_coefficients_vec(vec![leaf_scalar]);\n            return self.pc.commit(\u0026poly)\n                .map_err(|e| CoreError::PolynomialCommitmentError(format!(\"Failed to commit leaf: {}\", e)));\n        }\n\n        let empty_scalar = self.empty_subtree_scalar(depth + 1);\n        let mut coeffs = Vec::with_capacity(VERKLE_RADIX);\n\n        for child_index in 0..VERKLE_RADIX {\n            let mut child_path = path.to_vec();\n            child_path.push(child_index as u8);\n            let child_scalar = if self.node_exists(\u0026child_path) {\n                let child_root = self.compute_node_root_hash(\u0026child_path, depth + 1)?;\n                \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026child_root)\n            } else {\n                empty_scalar\n            };\n            coeffs.push(child_scalar);\n        }\n\n        let poly = DensePolynomial::from_coefficients_vec(coeffs);\n        self.pc.commit(\u0026poly)\n            .map_err(|e| CoreError::PolynomialCommitmentError(format!(\"Failed to commit node polynomial: {}\", e)))\n    }\n\n    fn compute_empty_subtree_constants(\n        pc: \u0026PolynomialCommitment,\n    ) -\u003e Result\u003c(\n        Vec\u003c[u8; 32]\u003e,\n        Vec\u003c\u003cEdwardsProjective as Group\u003e::ScalarField\u003e,\n    ), CoreError\u003e {\n        let mut roots = vec![[0u8; 32]; KEY_SIZE + 1];\n        let mut scalars = vec![\u003cEdwardsProjective as Group\u003e::ScalarField::ZERO; KEY_SIZE + 1];\n\n        let empty_commitment = pc.commit(\u0026DensePolynomial::from_coefficients_vec(vec![]))\n            .map_err(|e| CoreError::PolynomialCommitmentError(format!(\"Failed to commit empty polynomial: {}\", e)))?;\n        roots[KEY_SIZE] = Self::commitment_root_hash(\u0026empty_commitment)?;\n        scalars[KEY_SIZE] = \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026roots[KEY_SIZE]);\n\n        for depth in (0..KEY_SIZE).rev() {\n            let child_scalar = scalars[depth + 1];\n            let coeffs = vec![child_scalar; VERKLE_RADIX];\n            let polynomial = DensePolynomial::from_coefficients_vec(coeffs);\n            let commitment = pc.commit(\u0026polynomial)\n                .map_err(|e| CoreError::PolynomialCommitmentError(format!(\"Failed to commit subtree polynomial: {}\", e)))?;\n            roots[depth] = Self::commitment_root_hash(\u0026commitment)?;\n            scalars[depth] = \u003cEdwardsProjective as Group\u003e::ScalarField::from_le_bytes_mod_order(\u0026roots[depth]);\n        }\n\n        Ok((roots, scalars))\n    }\n\n    fn empty_subtree_root_hash(\u0026self, depth: usize) -\u003e [u8; 32] {\n        self.empty_subtree_roots[depth]\n    }\n\n    fn empty_subtree_scalar(\u0026self, depth: usize) -\u003e \u003cEdwardsProjective as Group\u003e::ScalarField {\n        self.empty_subtree_scalars[depth]\n    }\n\n    fn compute_node_root_hash(\u0026self, path: \u0026[u8], depth: usize) -\u003e Result\u003c[u8; 32], CoreError\u003e {\n        let commitment = self.compute_node_commitment(path, depth)?;\n        Self::commitment_root_hash(\u0026commitment)\n    }\n\n    fn commitment_root_hash(commitment: \u0026Commitment) -\u003e Result\u003c[u8; 32], CoreError\u003e {\n        let mut bytes = Vec::n "stats":{"Line":2}},{"line":311,"address":[],"length":0,"stats":{"Line":2}},{"line":313,"address":[3213661],"length":1,"stats":{"Line":1}},{"line":314,"address":[3213838,3214103],"length":1,"stats":{"Line":3}},{"line":315,"address":[],"length":0,"stats":{"Line":1}},{"line":316,"address":[],"length":0,"stats":{"Line":1}},{"line":317,"address":[],"length":0,"stats":{"Line":3}},{"line":318,"address":[],"length":0,"stats":{"Line":2}},{"line":319,"address":[],"length":0,"stats":{"Line":2}},{"line":320,"address":[],"length":0,"stats":{"Line":2}},{"line":323,"address":[],"length":0,"stats":{"Line":1}},{"line":326,"address":[],"length":0,"stats":{"Line":1}},{"line":327,"address":[],"length":0,"stats":{"Line":1}},{"line":330,"address":[],"length":0,"stats":{"Line":1}},{"line":331,"address":[3209730],"length":1,"stats":{"Line":1}},{"line":334,"address":[3209808],"length":1,"stats":{"Line":1}},{"line":335,"address":[],"length":0,"stats":{"Line":1}},{"line":336,"address":[3210101],"length":1,"stats":{"Line":2}},{"line":339,"address":[],"length":0,"stats":{"Line":2}},{"line":340,"address":[],"length":0,"stats":{"Line":2}},{"line":341,"address":[],"length":0,"stats":{"Line":1}},{"line":342,"address":[],"length":0,"stats":{"Line":0}},{"line":343,"address":[],"length":0,"stats":{"Line":2}},{"line":344,"address":[],"length":0,"stats":{"Line":2}},{"line":346,"address":[],"length":0,"stats":{"Line":1}},{"line":347,"address":[],"length":0,"stats":{"Line":1}},{"line":350,"address":[],"length":0,"stats":{"Line":1}},{"line":351,"address":[],"length":0,"stats":{"Line":1}},{"line":352,"address":[],"length":0,"stats":{"Line":1}}],"covered":164,"coverable":189},{"path":["/","workspaces","klomang-core","src","core","state_manager.rs"],"content":"use crate::core::dag::BlockNode;\nuse crate::core::state::storage::Storage;\nuse crate::core::state::transaction::Transaction;\nuse crate::core::state::utxo::UtxoSet;\nuse crate::core::state::v_trie::VerkleTree;\n\n/// Minimal state container exposing the current Verkle root.\n#[derive(Debug, Clone)]\npub struct State {\n    pub root: [u8; 32],\n}\n\n/// Snapshot of the chain state at a specific block height.\n#[derive(Debug, Clone)]\npub struct StateSnapshot {\n    pub height: u64,\n    pub root: [u8; 32],\n}\n\n/// Error types untuk StateManager operations\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum StateManagerError {\n    InvalidRollback(String),\n    SnapshotNotFound(u64),\n    ApplyBlockFailed(String),\n    RestoreFailed(String),\n    CryptographicError(String),\n}\n\n/// Basic state manager for applying blocks, tracking snapshots, and rolling back.\n#[derive(Debug)]\npub struct StateManager\u003cS: Storage + Clone\u003e {\n    pub tree: VerkleTree\u003cS\u003e,\n    pub current_height: u64,\n    pub snapshots: Vec\u003cStateSnapshot\u003e,\n    snapshot_storages: Vec\u003cS\u003e,\n}\n\nimpl\u003cS: Storage + Clone\u003e StateManager\u003cS\u003e {\n    pub fn new(tree: VerkleTree\u003cS\u003e) -\u003e Result\u003cSelf, StateManagerError\u003e {\n        let root = tree.get_root()\n            .map_err(|e| StateManagerError::CryptographicError(format!(\"Failed to get root: {}\", e)))?;\n        let storage_snapshot = tree.storage_clone();\n\n        Ok(Self {\n            tree,\n            current_height: 0,\n            snapshots: vec![StateSnapshot { height: 0, root }],\n            snapshot_storages: vec![storage_snapshot],\n        })\n    }\n\n    /// Apply block dengan full error handling dan DAG reorganization support\n    pub fn apply_block(\u0026mut self, block: \u0026BlockNode, utxo: \u0026mut UtxoSet) -\u003e Result\u003c(), StateManagerError\u003e {\n        // Process transactions untuk state update\n        for tx in \u0026block.transactions {\n            self.apply_transaction(tx, utxo)?;\n        }\n\n        self.current_height += 1;\n\n        // Create snapshot setelah semua transactions applied\n        let new_root = self.get_root_hash()?;\n        self.snapshots.push(StateSnapshot {\n            height: self.current_height,\n            root: new_root,\n        });\n        self.snapshot_storages.push(self.tree.storage_clone());\n\n        Ok(())\n    }\n\n    /// Apply transaction dengan error handling untuk validation\n    fn apply_transaction(\u0026mut self, tx: \u0026Transaction, utxo: \u0026mut UtxoSet) -\u003e Result\u003c(), StateManagerError\u003e {\n        // Process inputs (remove from UTXO set)\n        for input in \u0026tx.inputs {\n            let key = (input.prev_tx.clone(), input.index);\n            utxo.utxos.remove(\u0026key);\n        }\n\n        // Process outputs (add to UTXO set dan tree)\n        for (i, output) in tx.outputs.iter().enumerate() {\n            let key = tx.hash_with_index(i as u32);\n            utxo.utxos.insert((tx.id.clone(), i as u32), output.clone());\n            self.tree.insert(key, output.serialize());\n        }\n\n        Ok(())\n    }\n\n    /// Get root hash dari current state\n    pub fn get_root_hash(\u0026self) -\u003e Result\u003c[u8; 32], StateManagerError\u003e {\n        self.tree.get_root()\n            .map_err(|e| StateManagerError::CryptographicError(format!(\"Failed to get root: {}\", e)))\n    }\n\n    /// Get state snapshot pada specific height\n    pub fn get_state_at(\u0026self, height: u64) -\u003e Option\u003c\u0026StateSnapshot\u003e {\n        self.snapshots.iter().find(|s| s.height == height)\n    }\n\n    /// Rollback state ke target height dengan error handling\n    pub fn rollback_state(\u0026mut self, target_height: u64) -\u003e Result\u003c(), StateManagerError\u003e {\n        // Validation\n        if target_height \u003e self.current_height {\n            return Err(StateManagerError::InvalidRollback(\n                format!(\"Cannot rollback to height {} when current height is {}\", \n                        target_height, self.current_height)\n            ));\n        }\n\n        // Check snapshot exists\n        if self.get_state_at(target_height).is_none() {\n            return Err(StateManagerError::SnapshotNotFound(target_height));\n        }\n\n        // Truncate snapshots dan storages\n        self.snapshots.truncate(target_height as usize + 1);\n        self.snapshot_storages.truncate(target_height as usize + 1);\n        self.current_height = target_height;\n\n        // Restore tree dari snapshot storage\n        let snapshot_storage = self\n            .snapshot_storages\n            .get(target_height as usize)\n            .ok_or_else(|| StateManagerError::RestoreFailed(\n                \"Snapshot storage missing after truncation\".to_string()\n            ))?;\n\n        self.tree = VerkleTree::new(snapshot_storage.clone())\n            .map_err(|e| StateManagerError::RestoreFailed(format!(\"Failed to restore tree: {}\", e)))?;\n        \n        // Verify restoration\n        let restored_root = self.get_root_hash()?;\n        let snapshot_root = self.snapshots[target_height as usize].root;\n        \n        if restored_root != snapshot_root {\n            return Err(StateManagerError::RestoreFailed(\n                format!(\"Root mismatch after rollback: expected {:?}, got {:?}\", \n                        snapshot_root, restored_root)\n            ));\n        }\n\n        Ok(())\n    }\n\n    /// Legacy rollback method - should use rollback_state() instead\n    pub fn rollback(\u0026mut self, target_height: u64) {\n        assert!(target_height \u003c= self.current_height);\n\n        self.snapshots.truncate(target_height as usize + 1);\n        self.snapshot_storages.truncate(target_height as usize + 1);\n        self.current_height = target_height;\n\n        let snapshot_storage = self\n            .snapshot_storages\n            .get(target_height as usize)\n            .expect(\"rollback snapshot missing\");\n\n        // NOTE: VerkleTree is not fully versioned; reset to the storage snapshot.\n        if let Ok(tree) = VerkleTree::new(snapshot_storage.clone()) {\n            self.tree = tree;\n        } else {\n            panic!(\"Failed to restore VerkleTree during rollback\");\n        }\n    }\n\n    /// Restore entire state dari specific snapshot\n    pub fn restore_from_snapshot(\u0026mut self, snapshot_root: [u8; 32], height: u64) -\u003e Result\u003c(), StateManagerError\u003e {\n        let snapshot_idx = self.snapshots.iter()\n            .position(|s| s.height == height \u0026\u0026 s.root == snapshot_root)\n            .ok_or_else(|| StateManagerError::SnapshotNotFound(height))?;\n\n        let storage = self.snapshot_storages\n            .get(snapshot_idx)\n            .ok_or_else(|| StateManagerError::RestoreFailed(\"Storage missing\".to_string()))?;\n\n        self.tree = VerkleTree::new(storage.clone())\n            .map_err(|e| StateManagerError::RestoreFailed(format!(\"Failed to restore tree: {}\", e)))?;\n        self.current_height = height;\n        \n        // Truncate snapshots ke restore point\n        self.snapshots.truncate(snapshot_idx + 1);\n        self.snapshot_storages.truncate(snapshot_idx + 1);\n\n        Ok(())\n    }\n\n    /// Get current state snapshot\n    pub fn get_current_state(\u0026self) -\u003e Result\u003cStateSnapshot, StateManagerError\u003e {\n        let root = self.tree.get_root()\n            .map_err(|e| StateManagerError::CryptographicError(format!(\"Failed to get root: {}\", e)))?;\n        Ok(StateSnapshot {\n            height: self.current_height,\n            root,\n        })\n    }\n\n    /// Validate snapshot consistency\n    pub fn validate_snapshots(\u0026self) -\u003e Result\u003c(), StateManagerError\u003e {\n        for (i, snapshot) in self.snapshots.iter().enumerate() {\n            if snapshot.height != i as u64 {\n                return Err(StateManagerError::ApplyBlockFailed(\n                    format!(\"Snapshot height mismatch at index {}\", i)\n                ));\n            }\n        }\n\n        if self.snapshots.len() != self.snapshot_storages.len() {\n            return Err(StateManagerError::ApplyBlockFailed(\n                \"Snapshot and storage length mismatch\".to_string()\n            ));\n        }\n\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::crypto::Hash;\n    use crate::core::dag::BlockNode;\n    use crate::core::state::storage::MemoryStorage;\n    use crate::core::state::transaction::{TxOutput, Transaction};\n    use std::collections::HashSet;\n\n    fn make_coinbase_transaction(value: u64, pubkey_hash: Hash) -\u003e Transaction {\n        Transaction::new(\n            Vec::new(),\n            vec![TxOutput {\n                value,\n                pubkey_hash,\n            }],\n        )\n    }\n\n    fn make_block(id_bytes: \u0026[u8], transactions: Vec\u003cTransaction\u003e) -\u003e BlockNode {\n        BlockNode {\n            id: Hash::new(id_bytes),\n            parents: HashSet::new(),\n            children: HashSet::new(),\n            selected_parent: None,\n            blue_set: HashSet::new(),\n            red_set: HashSet::new(),\n            blue_score: 0,\n            timestamp: 0,\n            difficulty: 0,\n            nonce: 0,\n            transactions,\n        }\n    }\n\n    #[test]\n    fn test_state_manager_apply_block() {\n        let storage = MemoryStorage::new();\n        let tree = VerkleTree::new(storage).expect(\"failed to create VerkleTree\");\n        let mut manager = StateManager::new(tree).expect(\"failed to create StateManager\");\n        let mut utxo = UtxoSet::new();\n\n        let tx = make_coinbase_transaction(42, Hash::new(b\"alice\"));\n        let block = make_block(b\"block-1\", vec![tx.clone()]);\n\n        let root_before = manager.tree.get_root().expect(\"failed to get root\");\n        manager.apply_block(\u0026block, \u0026mut utxo).expect(\"apply block failed\");\n        let root_after = manager.tree.get_root().expect(\"failed to get root\");\n\n        assert_ne!(root_before, root_after);\n        assert_eq!(manager.current_height, 1);\n        assert_eq!(manager.snapshots.len(), 2);\n        assert_eq!(utxo.utxos.len(), 1);\n        assert_eq!(manager.get_state_at(1).unwrap().root, root_after);\n    }\n\n    #[test]\n    fn test_state_manager_snapshot() {\n        let storage = MemoryStorage::new();\n        let tree = VerkleTree::new(storage).expect(\"failed to create VerkleTree\");\n        let mut manager = StateManager::new(tree).expect(\"failed to create StateManager\");\n        let mut utxo = UtxoSet::new();\n\n        let block1 = make_block(b\"block-1\", vec![make_coinbase_transaction(10, Hash::new(b\"alice\"))]);\n        manager.apply_block(\u0026block1, \u0026mut utxo).expect(\"apply block failed\");\n        let snapshot1 = manager.get_state_at(1).expect(\"snapshot at height 1\");\n        let snapshot1_root = snapshot1.root;\n        let snapshot1_height = snapshot1.height;\n\n        let block2 = make_block(b\"block-2\", vec![make_coinbase_transaction(20, Hash::new(b\"bob\"))]);\n        manager.apply_block(\u0026block2, \u0026mut utxo).expect(\"apply block failed\");\n        let snapshot2 = manager.get_state_at(2).expect(\"snapshot at height 2\");\n\n        assert_ne!(snapshot1_root, snapshot2.root);\n        assert_eq!(snapshot1_height, 1);\n        assert_eq!(snapshot2.height, 2);\n    }\n\n    #[test]\n    fn test_state_manager_rollback() {\n        let storage = MemoryStorage::new();\n        let tree = VerkleTree::new(storage).expect(\"failed to create VerkleTree\");\n        let mut manager = StateManager::new(tree).expect(\"failed to create StateManager\");\n        let mut utxo = UtxoSet::new();\n\n        let block1 = make_block(b\"block-1\", vec![make_coinbase_transaction(10, Hash::new(b\"alice\"))]);\n        manager.apply_block(\u0026block1, \u0026mut utxo).expect(\"apply block failed\");\n        let root1 = manager.tree.get_root().expect(\"failed to get root\");\n\n        let block2 = make_block(b\"block-2\", vec![make_coinbase_transaction(20, Hash::new(b\"bob\"))]);\n        manager.apply_block(\u0026block2, \u0026mut utxo).expect(\"apply block failed\");\n        let root2 = manager.tree.get_root().expect(\"failed to get root\");\n\n        assert_ne!(root1, root2);\n        assert_eq!(manager.current_height, 2);\n\n        manager.rollback(1);\n\n        assert_eq!(manager.current_height, 1);\n        assert_eq!(manager.snapshots.len(), 2);\n        assert_eq!(manager.get_state_at(1).unwrap().root, root1);\n        assert_eq!(manager.tree.get_root().expect(\"failed to get root\"), root1);\n    }\n\n    #[test]\n    fn test_state_manager_rollback_state_result() {\n        let storage = MemoryStorage::new();\n        let tree = VerkleTree::new(storage).expect(\"failed to create VerkleTree\");\n        let mut manager = StateManager::new(tree).expect(\"failed to create StateManager\");\n        let mut utxo = UtxoSet::new();\n\n        let block1 = make_block(b\"block-1\", vec![make_coinbase_transaction(10, Hash::new(b\"alice\"))]);\n        manager.apply_block(\u0026block1, \u0026mut utxo).expect(\"apply block failed\");\n\n        let block2 = make_block(b\"block-2\", vec![make_coinbase_transaction(20, Hash::new(b\"bob\"))]);\n        manager.apply_block(\u0026block2, \u0026mut utxo).expect(\"apply block failed\");\n\n        // Successful rollback\n        let result = manager.rollback_state(1);\n        assert!(result.is_ok());\n        assert_eq!(manager.current_height, 1);\n\n        // Valid rollback to same height\n        let result = manager.rollback_state(1);\n        assert!(result.is_ok());\n\n        // Invalid rollback to future height\n        let result = manager.rollback_state(5);\n        assert!(result.is_err());\n        match result {\n            Err(StateManagerError::InvalidRollback(_)) =\u003e {},\n            _ =\u003e panic!(\"Expected InvalidRollback error\"),\n        }\n    }\n\n    #[test]\n    fn test_state_manager_get_root_hash() {\n        let storage = MemoryStorage::new();\n        let tree = VerkleTree::new(storage).expect(\"failed to create VerkleTree\");\n        let manager = StateManager::new(tree).expect(\"failed to create StateManager\");\n\n        let root = manager.get_root_hash().expect(\"failed to get root hash\");\n        assert_eq!(root.len(), 32);\n        assert_eq!(root, manager.snapshots[0].root);\n    }\n\n    #[test]\n    fn test_state_manager_restore_from_snapshot() {\n        let storage = MemoryStorage::new();\n        let tree = VerkleTree::new(storage).expect(\"failed to create VerkleTree\");\n        let mut manager = StateManager::new(tree).expect(\"failed to create StateManager\");\n        let mut utxo = UtxoSet::new();\n\n        let block1 = make_block(b\"block-1\", vec![make_coinbase_transaction(10, Hash::new(b\"alice\"))]);\n        manager.apply_block(\u0026block1, \u0026mut utxo).expect(\"apply block failed\");\n        let snapshot1_root = manager.get_state_at(1).unwrap().root;\n\n        let block2 = make_block(b\"block-2\", vec![make_coinbase_transaction(20, Hash::new(b\"bob\"))]);\n        manager.apply_block(\u0026block2, \u0026mut utxo).expect(\"apply block failed\");\n\n        // Restore to height 1\n        let result = manager.restore_from_snapshot(snapshot1_root, 1);\n        assert!(result.is_ok());\n        assert_eq!(manager.current_height, 1);\n        assert_eq!(manager.get_root_hash().expect(\"failed to get root hash\"), snapshot1_root);\n    }\n\n    #[test]\n    fn test_state_manager_validate_snapshots() {\n        let storage = MemoryStorage::new();\n        let tree = VerkleTree::new(storage).expect(\"failed to create VerkleTree\");\n        let mut manager = StateManager::new(tree).expect(\"failed to create StateManager\");\n        let mut utxo = UtxoSet::new();\n\n        // Valid snapshots\n        assert!(manager.validate_snapshots().is_ok());\n\n        let block1 = make_block(b\"block-1\", vec![make_coinbase_transaction(10, Hash::new(b\"alice\"))]);\n
